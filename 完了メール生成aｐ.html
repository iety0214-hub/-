<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>契約・金消完了報告作成ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFD700 0%, #000000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #FFD700 0%, #000000 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-section {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .required::after {
            content: " *";
            color: #ef4444;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-copy {
            background: #10b981;
            color: white;
        }

        .btn-copy:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .preview-section {
            background: #f8f9fa;
            padding: 30px;
            border-top: 2px solid #e0e0e0;
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .preview-box {
            background: white;
            padding: 24px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>

            </div>

                    <option value="">選択してください</option>
                    <option value="茂木社長">茂木社長</option>

                    <option value="髙野係長">髙野係長</option>
                    <option value="大内社員">大内社員</option>

                    <option value="佐野係長">佐野係長</option>
                    <option value="坪井社員">坪井社員</option>
                    <option value="桃井社員">桃井社員</option>
                    <option value="五十嵐社員">五十嵐社員</option>
                    <option value="三浦社員">三浦社員</option>

            <div class="form-group">

                    <option value="土屋次長">土屋次長</option>

        <div class="preview-section" id="previewSection">

        </div>

    <div class="toast" id="toast">コピーしました！</div>

    <script>
        // 件名自動更新
        function updateSubject() {
            const reportType = document.getElementById('reportType').value;
            const category = document.getElementById('category').value;
            const propertyName = document.getElementById('propertyName').value;
            const customProperty = document.getElementById('customProperty').value.trim();
            const subjectPreview = document.getElementById('subjectPreview');
            
            if (!reportType) {
                subjectPreview.value = '';
                return;
            }
            
            let finalProperty = '';
            if (propertyName === 'その他' && customProperty) {
                finalProperty = customProperty;
            } else if (propertyName && propertyName !== 'その他' && propertyName !== '新規追加') {
                finalProperty = propertyName;
            }
            
            let subject = '【' + reportType + '】';
            if (category) {
                subject += '【' + category + '】';
            }
            if (finalProperty) {
                subject += finalProperty;
            }
            
            subjectPreview.value = subject;
        }

        // イベントリスナー設定
        document.getElementById('reportType').addEventListener('change', updateSubject);
        document.getElementById('category').addEventListener('change', updateSubject);
        
        document.getElementById('propertyName').addEventListener('change', function() {
            const customGroup = document.getElementById('customPropertyGroup');
            const addGroup = document.getElementById('addPropertyGroup');
            
            if (this.value === 'その他') {
                customGroup.style.display = 'block';
                addGroup.style.display = 'none';
            } else if (this.value === '新規追加') {
                customGroup.style.display = 'none';
                addGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
                addGroup.style.display = 'none';
                document.getElementById('customProperty').value = '';
                document.getElementById('newProperty').value = '';
            }
            updateSubject();
        });

        // 新規物件追加ボタン
        document.getElementById('btnAddProperty').addEventListener('click', function() {
            const newPropertyName = document.getElementById('newProperty').value.trim();
            
            if (!newPropertyName) {
                alert('物件名を入力してください');
                return;
            }
            
            // ドロップダウンに追加
            const select = document.getElementById('propertyName');
            const newOption = document.createElement('option');
            newOption.value = newPropertyName;
            newOption.textContent = newPropertyName;
            
            // 「その他」の前に挿入
            const otherOption = select.querySelector('option[value="その他"]');
            select.insertBefore(newOption, otherOption);
            
            // 追加した物件を選択状態にする
            select.value = newPropertyName;
            
            // localStorageに保存
            savePropertyToStorage(newPropertyName);
            
            // 入力欄を隠す
            document.getElementById('addPropertyGroup').style.display = 'none';
            document.getElementById('newProperty').value = '';
            
            // 件名更新
            updateSubject();
            
            showToast('物件「' + newPropertyName + '」をリストに追加しました', 'success');
        });

        // localStorageに物件名を保存
        function savePropertyToStorage(propertyName) {
            let savedProperties = localStorage.getItem('customProperties');
            let propertiesArray = savedProperties ? JSON.parse(savedProperties) : [];
            
            if (!propertiesArray.includes(propertyName)) {
                propertiesArray.push(propertyName);
                localStorage.setItem('customProperties', JSON.stringify(propertiesArray));
            }
        }

        // ページ読み込み時にlocalStorageから物件名を復元
        function loadPropertiesFromStorage() {
            let savedProperties = localStorage.getItem('customProperties');
            if (!savedProperties) return;
            
            let propertiesArray = JSON.parse(savedProperties);
            const select = document.getElementById('propertyName');
            const otherOption = select.querySelector('option[value="その他"]');
            
            propertiesArray.forEach(function(propertyName) {
                const newOption = document.createElement('option');
                newOption.value = propertyName;
                newOption.textContent = propertyName;
                select.insertBefore(newOption, otherOption);
            });
        }

        // ページ読み込み時に実行
        loadPropertiesFromStorage();

        // 役職編集ボタン
        document.getElementById('btnEditStaff').addEventListener('click', function() {
            const currentList = [
                '茂木社長', '井上常務', '土屋次長', '笠原部長', '家原部長', 
                '伊藤係長', '川合部長', '安部課長', '髙野係長', '大内社員',
                '浅見社員', '佐野係長', '坪井社員', '桃井社員', '五十嵐社員',
                '三浦社員', '脇田社員', '儀間主任', '内田社員', '瓜田社員',
                '柴田社員', '木村社員', '後藤社員'
            ];
            
            const newList = prompt('社員名簿を編集してください（カンマ区切り）\n\n例：茂木社長,井上常務,土屋次長', currentList.join(','));
            
            if (newList !== null && newList.trim() !== '') {
                const staffArray = newList.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s !== ''; });
                
                if (staffArray.length === 0) {
                    alert('最低1名は登録してください');
                    return;
                }
                
                // 全ドロップダウンを更新
                updateStaffDropdowns(staffArray);
                
                // localStorageに保存
                localStorage.setItem('staffList', JSON.stringify(staffArray));
                
                showToast('社員名簿を更新しました', 'success');
            }
        });

        // 社員ドロップダウンを更新する関数
        function updateStaffDropdowns(staffArray) {
            const selects = ['personInCharge', 'accompany', 'department'];
            
            selects.forEach(function(selectId) {
                const select = document.getElementById(selectId);
                const currentValue = select.value;
                
                // オプションをクリア（「選択してください」以外）
                while (select.options.length > 1) {
                    select.remove(1);
                }
                
                // 新しいオプションを追加
                staffArray.forEach(function(staff) {
                    const option = document.createElement('option');
                    option.value = staff;
                    option.textContent = staff;
                    select.appendChild(option);
                });
                
                // 以前の選択を復元（存在する場合）
                if (staffArray.indexOf(currentValue) !== -1) {
                    select.value = currentValue;
                }
            });
        }

        // ページ読み込み時に保存された社員リストを復元
        function loadStaffFromStorage() {
            const savedStaff = localStorage.getItem('staffList');
            if (savedStaff) {
                try {
                    const staffArray = JSON.parse(savedStaff);
                    updateStaffDropdowns(staffArray);
                } catch (e) {
                    console.error('社員リスト読み込みエラー:', e);
                }
            }
        }

        // ページ読み込み時に実行
        loadStaffFromStorage();

        document.getElementById('customProperty').addEventListener('input', updateSubject);

        document.getElementById('bank').addEventListener('change', function() {
            const customGroup = document.getElementById('customBankGroup');
            if (this.value === 'その他') {
                customGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
                document.getElementById('customBank').value = '';
            }
        });

        // 生成ボタン
        document.getElementById('btnGenerate').addEventListener('click', function() {
            const reportType = document.getElementById('reportType').value;
            const category = document.getElementById('category').value;
            const customerName = document.getElementById('customerName').value.trim();
            const propertyName = document.getElementById('propertyName').value;
            const customProperty = document.getElementById('customProperty').value.trim();
            const roomNumber = document.getElementById('roomNumber').value.trim();
            const bank = document.getElementById('bank').value;
            const customBank = document.getElementById('customBank').value.trim();
            const contractDate = document.getElementById('contractDate').value;
            const settlementDate = document.getElementById('settlementDate').value;
            const personInCharge = document.getElementById('personInCharge').value;
            const accompany = document.getElementById('accompany').value;
            const department = document.getElementById('department').value;
            const subject = document.getElementById('subjectPreview').value;

            // 必須チェック
            if (!reportType) {
                alert('種別を選択してください');
                return;
            }
            if (!category) {
                alert('区分を選択してください');
                return;
            }
            if (!customerName) {
                alert('顧客名を入力してください');
                return;
            }
            if (!propertyName || propertyName === '新規追加') {
                alert('物件名を選択してください');
                return;
            }
            if (propertyName === 'その他' && !customProperty) {
                alert('物件名を入力してください');
                return;
            }
            if (!bank) {
                alert('銀行を選択してください');
                return;
            }
            if (bank === 'その他' && !customBank) {
                alert('銀行名を入力してください');
                return;
            }
            if (!personInCharge) {
                alert('担当を選択してください');
                return;
            }

            // 値の確定
            const finalPropertyName = propertyName === 'その他' ? customProperty : propertyName;
            const finalBank = bank === 'その他' ? customBank : bank;
            const finalCustomerName = customerName.endsWith('様') ? customerName : customerName + '様';

            // 日付フォーマット
            let formattedContractDate = '';
            if (contractDate) {
                const date = new Date(contractDate);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                formattedContractDate = year + '年' + month + '月' + day + '日';
            }

            let formattedSettlementDate = '';
            if (settlementDate) {
                const date = new Date(settlementDate);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                formattedSettlementDate = year + '年' + month + '月' + day + '日';
            }

            // メール本文生成（件名は別で使うので本文には含めない）
            let report = '【種別】' + reportType + '\n\n';
            report += '【区分】' + category + '\n\n';
            report += '【顧客名】' + finalCustomerName + '\n\n';
            report += '【物件名】' + finalPropertyName + '\n\n';
            report += '【号室】' + (roomNumber || '－') + '\n\n';
            report += '【銀行】' + finalBank + '\n\n';
            report += '【契約】' + (formattedContractDate || '－') + '\n\n';
            report += '【決済予定】' + (formattedSettlementDate || '－') + '\n\n';
            report += '【担当】' + (personInCharge || '－') + '\n\n';
            report += '【同行】' + (accompany || '－') + '\n\n';
            report += '【所属】' + (department || '－');

            document.getElementById('previewBox').textContent = report;
            document.getElementById('previewSection').classList.add('active');
            document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
        });

        // コピーボタン
        document.getElementById('btnCopy').addEventListener('click', function() {
            const previewBox = document.getElementById('previewBox');
            const text = previewBox.textContent;
            
            if (!text || text.trim() === '') {
                alert('先に「生成」ボタンを押してください');
                return;
            }
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(function() {
                        showToast('コピーしました！', 'success');
                    })
                    .catch(function(err) {
                        console.error('クリップボードAPI失敗:', err);
                        fallbackCopy(text);
                    });
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('コピーしました！', 'success');
                } else {
                    showToast('コピーに失敗しました', 'error');
                }
            } catch (err) {
                console.error('代替コピー失敗:', err);
                showToast('コピーに失敗しました', 'error');
            }
            
            document.body.removeChild(textarea);
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            
            if (type === 'error') {
                toast.style.background = '#ef4444';
            } else {
                toast.style.background = '#10b981';
            }
            
            toast.classList.add('active');
            setTimeout(function() {
                toast.classList.remove('active');
            }, 3000);
        }
    </script>
</body>
</html>
