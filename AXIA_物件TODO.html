function load(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return INIT.map(p=>({...p}));}
function persist(ps){localStorage.setItem(STORAGE_KEY,JSON.stringify(ps));}
function getAllKeys(){return[...SECTIONS.flatMap(s=>s.keys),...SBJ_KEYS];}
function calc(checks,sbjVisible=false){
  const keys=[...SECTIONS.flatMap(s=>s.keys),...(sbjVisible?SBJ_KEYS:[])];
  const done=keys.filter(k=>(checks[k]??false)===true).length;
  const total=keys.length;
  const hasWarn=keys.some(k=>(checks[k]??false)==='warn');
  return{done,total,hasWarn};
}

function Ring({done,total}){
  const sz=44,r=sz/2-5,c=2*Math.PI*r,pct=total>0?done/total:0,d=c*pct;
  const col=pct===1?'#2ecc7a':pct>.6?'#e8b84b':pct>0?'#ff9f43':'#ff5757';
  return(<svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`} style={{transform:'rotate(-90deg)'}}>
    <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="4"/>
    <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="4" strokeDasharray={`${d} ${c}`} strokeLinecap="round"/>
    <text x={sz/2} y={sz/2+5} textAnchor="middle" fill={col} fontSize="11" fontFamily="DM Mono,monospace" fontWeight="700"
      style={{transform:`rotate(90deg)`,transformOrigin:`${sz/2}px ${sz/2}px`}}>{done}/{total}</text>
  </svg>);
}

function CheckItem({id,ck,val,memo,onToggle,onMemo}){
  const done=val===true,warn=val==='warn';
  const next=val===false?true:val===true?'warn':false;
  const icon=warn?'⚠️':done?'✅':'❌';
  const bg=warn?'rgba(255,179,71,.12)':done?'rgba(46,204,122,.12)':'rgba(255,87,87,.12)';
  const bc=warn?'#ffb347':done?'#2ecc7a':'#ff5757';
  return(<div>
    <div onClick={()=>onToggle(id,ck,next)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 4px',borderBottom:'1px solid rgba(255,255,255,.04)',cursor:'pointer',borderRadius:8}}>
      <div style={{flexShrink:0,width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,background:bg,border:`2px solid ${bc}`}}>{icon}</div>
      <div style={{flex:1,fontSize:13,fontWeight:500,color:done?'var(--gray)':'var(--white)',textDecoration:done?'line-through':'none'}}>{LABELS[ck]||ck}</div>
    </div>
    {warn&&<textarea value={memo||''} onChange={e=>onMemo(id,ck,e.target.value)} onClick={e=>e.stopPropagation()} placeholder="⚠️ 要確認の内容を入力…"
      style={{display:'block',width:'calc(100% - 42px)',marginLeft:42,marginBottom:6,padding:'7px 10px',borderRadius:8,background:'rgba(255,179,71,.08)',border:'1px solid rgba(255,179,71,.35)',fontSize:12,color:'#ffb347',resize:'none',outline:'none',minHeight:44,lineHeight:1.5}}/>}
  </div>);
}

function Modal({onClose,title,sub,children}){
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(5,12,22,.85)',backdropFilter:'blur(6px)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'#182b42',borderRadius:'24px 24px 0 0',borderTop:'1px solid var(--border)',width:'100%',maxWidth:560,maxHeight:'90vh',overflowY:'auto',paddingBottom:40}}>
      <div style={{width:40,height:4,background:'rgba(255,255,255,.2)',borderRadius:2,margin:'12px auto 0'}}/>
      <div style={{fontSize:16,fontWeight:900,padding:'16px 20px 4px',textAlign:'center'}}>{title}</div>
      {sub&&<div style={{fontSize:11,color:'var(--gray)',textAlign:'center',paddingBottom:16}}>{sub}</div>}
      {children}
    </div>
  </div>);
}

  if(!prop)return null;
  return(<Modal title="🗑 削除の確認" sub={`「${prop.name}」を削除しますか？`} onClose={onClose}>
    <div style={{display:'flex',gap:10,padding:'8px 16px 0'}}>
      <button onClick={onClose} style={{flex:1,padding:14,borderRadius:12,border:'1px solid rgba(255,255,255,.15)',background:'transparent',color:'var(--gray)',fontSize:14,fontWeight:700}}>キャンセル</button>
      <button onClick={onConfirm} style={{flex:1,padding:14,borderRadius:12,border:'none',background:'#ff5757',color:'#fff',fontSize:14,fontWeight:900}}>削除する</button>

function AddModal({defaultTab,onAdd,onClose}){

  const ref=useRef();
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),300);},[]);
  const submit=()=>{if(!name.trim()){ref.current?.focus();return;}onAdd({name:name.trim(),date,buyer,kinshoki,tab});};
  const iStyle={width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid var(--border)',borderRadius:10,padding:'11px 14px',color:'var(--white)',fontSize:14,outline:'none'};
  const lStyle={fontSize:11,fontWeight:700,color:'var(--gold)',letterSpacing:'.08em',marginBottom:6,display:'block',fontFamily:'var(--mono)'};
  return(<Modal title="🏠 新しい物件を追加" sub="入力後「追加する」を押すと即反映" onClose={onClose}>
    {[['物件名 *',name,setName,ref,'例: MAXIV新川崎502'],['決済日',date,setDate,null,'例: 4/28'],['買主様',buyer,setBuyer,null,'例: 山田 太郎'],['金消日',kinshoki,setKinshoki,null,'例: 4/25(土) 13:00']].map(([lbl,val,set,r,ph])=>(
      <div key={lbl} style={{padding:'0 16px 14px'}}>
        <label style={lStyle}>{lbl}</label>
        <input ref={r} value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={iStyle}/>
      </div>
    ))}
    <div style={{padding:'0 16px 14px'}}>
      <label style={lStyle}>タブ</label>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {TABS.map(t=>(

function Card({prop,onUpdate,onDelete,onDeleteReq,onCopyReq}){

  const isSbj=true; // 全物件にSBJチップを表示
  const {done,total,hasWarn}=calc(prop.checks,prop.sbjVisible);
  const bc=hasWarn?'rgba(255,179,71,.4)':done===total?'rgba(46,204,122,.4)':done===0?'rgba(255,87,87,.3)':'var(--border)';

  const upd=(f,v)=>onUpdate(prop.id,{[f]:v});
  const togCheck=(id,k,nxt)=>onUpdate(id,{checks:{...prop.checks,[k]:nxt}});
  const togMemo=(id,k,v)=>onUpdate(id,{warnMemos:{...prop.warnMemos,[k]:v}});

  const iStyle={background:'transparent',border:'none',outline:'none',fontSize:11,fontWeight:600,color:'var(--white)',fontFamily:'var(--font)'};

  return(<div style={{background:'var(--card-bg)',border:`1px solid ${bc}`,borderRadius:14,overflow:'hidden',marginBottom:10}}>
    <div onClick={e=>{if(e.target.closest('input')||e.target.closest('button')||e.target.closest('textarea'))return;setOpen(o=>!o);}}
      style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer'}}>
      <Ring done={done} total={total}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{prop.name||'（物件名未設定）'}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5,alignItems:'center'}}>
          {isSbj&&<span onClick={e=>{e.stopPropagation();onUpdate(prop.id,{sbjVisible:!prop.sbjVisible});}}
            style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:8,fontSize:10,fontWeight:700,cursor:'pointer',userSelect:'none',fontFamily:'var(--mono)',
              background:prop.sbjVisible?'rgba(100,160,255,.25)':'rgba(100,160,255,.06)',

              border:`1px solid ${prop.sbjVisible?'#64a0ff':'rgba(100,160,255,.2)'}`,

          <span style={{display:'inline-flex',alignItems:'center',gap:3,background:'rgba(255,255,255,.07)',borderRadius:8,padding:'2px 6px 2px 7px',fontSize:11,color:'var(--gray)'}}>
            📅<input value={prop.date} onChange={e=>upd('date',e.target.value)} onClick={e=>e.stopPropagation()} placeholder="決済日" style={{...iStyle,width:52}}/>
          </span>
          <span style={{display:'inline-flex',alignItems:'center',gap:3,background:'rgba(255,255,255,.07)',borderRadius:8,padding:'2px 6px 2px 7px',fontSize:11,color:'var(--gray)'}}>
            👤<input value={prop.buyer} onChange={e=>upd('buyer',e.target.value)} onClick={e=>e.stopPropagation()} placeholder="買主様" style={{...iStyle,width:64}}/>
          </span>
          <span style={{display:'inline-flex',alignItems:'center',gap:3,background:'rgba(232,184,75,.1)',borderRadius:8,padding:'2px 6px 2px 7px',fontSize:11,color:'var(--gold)'}}>
            ⏰<input value={prop.kinshoki} onChange={e=>upd('kinshoki',e.target.value)} onClick={e=>e.stopPropagation()} placeholder="金消日" style={{...iStyle,width:110,color:'var(--gold)'}}/>
          </span>
        </div>
      </div>
      <div style={{flexShrink:0,fontSize:12,color:'var(--gray)',transition:'transform .3s',transform:open?'rotate(180deg)':'none'}}>▼</div>
    </div>

    {open&&<div style={{padding:'0 14px 14px'}}>
      {/* 物件名編集 */}
      <div style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--gold)',letterSpacing:'.08em',marginBottom:6,fontFamily:'var(--mono)'}}>🏠 物件名</div>
        <input
          value={prop.name}
          onChange={e=>upd('name',e.target.value)}
          placeholder="物件名を入力"
          style={{width:'100%',background:'rgba(255,255,255,.06)',border:'1px solid var(--border)',
            borderRadius:10,padding:'10px 12px',color:'var(--white)',fontSize:14,fontWeight:700,
            outline:'none',fontFamily:'var(--font)'}}/>
      </div>
      {SECTIONS.map((sec,si)=>(
        <div key={sec.label}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--gold)',letterSpacing:'.1em',textTransform:'uppercase',padding:'10px 0 6px',fontFamily:'var(--mono)',borderTop:si===0?'none':'1px solid var(--border)',marginTop:si===0?0:8}}>{sec.label}</div>
          {sec.keys.map(k=><CheckItem key={k} id={prop.id} ck={k} val={prop.checks[k]??false} memo={prop.warnMemos?.[k]||''} onToggle={togCheck} onMemo={togMemo}/>)}
        </div>
      ))}
      {isSbj&&prop.sbjVisible&&<div>
        <div style={{fontSize:10,fontWeight:700,color:'var(--gold)',letterSpacing:'.1em',textTransform:'uppercase',padding:'10px 0 6px',fontFamily:'var(--mono)',borderTop:'1px solid var(--border)',marginTop:8}}>🏦 SBJ</div>
        {SBJ_KEYS.map(k=><CheckItem key={k} id={prop.id} ck={k} val={prop.checks[k]??false} memo={prop.warnMemos?.[k]||''} onToggle={togCheck} onMemo={togMemo}/>)}
      </div>}

      <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16,borderTop:'1px solid var(--border)',paddingTop:12}}>
        <button onClick={e=>{e.stopPropagation();onCopyReq(prop.id);}}
          style={{fontSize:11,color:'var(--gold)',border:'1px solid rgba(232,184,75,.4)',background:'transparent',borderRadius:8,padding:'6px 14px',fontWeight:700}}>
          📋 コピー
        </button>
        <button onClick={e=>{e.stopPropagation();onDeleteReq(prop.id);}}
          style={{fontSize:11,color:'var(--red)',border:'1px solid rgba(255,87,87,.3)',background:'transparent',borderRadius:8,padding:'6px 14px',fontWeight:700}}>
          🗑 削除
        </button>
      </div>
    </div>}
  </div>);
}

function App(){
  const [props,setProps]=useState(()=>load());
  const [tab,setTab]=useState('rakuten');
  const [flt,setFlt]=useState('all');
  const [showAdd,setShowAdd]=useState(false);
  const [copyId,setCopyId]=useState(null);
  const [saved,setSaved]=useState(false);
  const [deleteId,setDeleteId]=useState(null);

  useEffect(()=>{persist(props);setSaved(true);const t=setTimeout(()=>setSaved(false),2000);return()=>clearTimeout(t);},[props]);

  const upd=useCallback((id,patch)=>setProps(ps=>ps.map(p=>p.id===id?{...p,...patch}:p)),[]);
  const del=useCallback((id)=>setProps(ps=>ps.filter(p=>p.id!==id)),[]);
  const add=useCallback(({name,date,buyer,kinshoki,tab:t})=>{
    setProps(ps=>[...ps,{id:'u_'+Date.now(),name,date,buyer,kinshoki,tab:t,sbjVisible:false,warnMemos:{},checks:{...DC}}]);
    setTab(t);setShowAdd(false);
  },[]);
  const doCopy=useCallback((toTab)=>{
    const src=props.find(p=>p.id===copyId);if(!src)return;
    setProps(ps=>[...ps,{...JSON.parse(JSON.stringify(src)),id:'u_'+Date.now(),name:src.name+'（コピー）',tab:toTab}]);
    setTab(toTab);setCopyId(null);
  },[props,copyId]);

  const visible=useMemo(()=>props.filter(p=>{
    if(p.tab!==tab)return false;
    if(flt==='all')return true;
    const{done,total,hasWarn}=calc(p.checks);
    if(flt==='done')return done===total;
    if(flt==='undone')return done!==total;
    if(flt==='warn')return hasWarn;
    return true;
  }),[props,tab,flt]);

  const st=useMemo(()=>{let done=0,warn=0,active=0;props.forEach(p=>{const{done:d,total:t,hasWarn}=calc(p.checks);if(hasWarn)warn++;else if(d===t)done++;else active++;});return{total:props.length,done,warn,active};},[props]);

  return(<div>
    <div style={{background:'linear-gradient(135deg,#0d1b2a,#1a2e45)',borderBottom:'1px solid var(--border)',padding:'16px 16px 12px',position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:'var(--gold)',letterSpacing:'.12em',fontFamily:'var(--mono)'}}>AXIA JAPAN</div>
          <div style={{fontSize:17,fontWeight:900}}>物件TODOリスト</div>
        </div>
        <div style={{background:'rgba(46,204,122,.12)',border:'1px solid #2ecc7a',color:'#2ecc7a',fontSize:10,padding:'3px 8px',borderRadius:20,fontWeight:700,fontFamily:'var(--mono)',opacity:saved?1:0,transition:'opacity .4s'}}>✓ 保存済み</div>
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto'}}>
        {TABS.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)}
            style={{flexShrink:0,padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${tab===t.key?'var(--gold)':'rgba(255,255,255,.1)'}`,background:tab===t.key?'var(--gold)':'rgba(255,255,255,.04)',color:tab===t.key?'var(--navy)':'var(--gray)',whiteSpace:'nowrap'}}>
            {t.label}
          </button>
        ))}
      </div>
    </div>

    <div style={{display:'flex',gap:10,padding:'12px 16px',borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
      {[{n:st.total,l:'全物件',c:'var(--gold)'},{n:st.done,l:'完了',c:'#2ecc7a'},{n:st.warn,l:'要確認',c:'#ffb347'},{n:st.active,l:'対応中',c:'#ff5757'}].map(({n,l,c})=>(
        <div key={l} style={{flexShrink:0,display:'flex',alignItems:'center',gap:6,background:'var(--card-bg)',border:'1px solid var(--border)',borderRadius:10,padding:'7px 12px'}}>
          <div style={{fontSize:20,fontWeight:900,fontFamily:'var(--mono)',color:c}}>{n}</div>
          <div style={{fontSize:10,color:'var(--gray)',fontWeight:500,lineHeight:1.2}}>{l}</div>
        </div>
      ))}
    </div>

    <div style={{display:'flex',gap:6,padding:'10px 12px 0',overflowX:'auto'}}>
      {[['all','すべて'],['undone','🔴 未対応あり'],['done','🟢 完了'],['warn','⚠️ 要確認']].map(([k,l])=>(
        <button key={k} onClick={()=>setFlt(k)}
          style={{flexShrink:0,padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,border:`1px solid ${flt===k?'var(--gold)':'rgba(255,255,255,.12)'}`,background:flt===k?'var(--navy2)':'transparent',color:flt===k?'var(--gold)':'var(--gray)'}}>
          {l}
        </button>
      ))}
    </div>

    <div style={{padding:'12px 12px 0'}}>
      {visible.length===0
        ?<div style={{textAlign:'center',padding:'60px 20px',color:'var(--gray)',fontSize:14}}>該当する物件がありません</div>
        :visible.map(p=><Card key={p.id} prop={p} onUpdate={upd} onDelete={del} onDeleteReq={id=>setDeleteId(id)} onCopyReq={id=>setCopyId(id)}/>)
      }
    </div>

    <button onClick={()=>setShowAdd(true)} style={{position:'fixed',bottom:24,right:20,width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,boxShadow:'0 4px 20px rgba(232,184,75,.4)',zIndex:200,border:'none',color:'var(--navy)'}}>＋</button>

    {showAdd&&<AddModal defaultTab={tab} onAdd={add} onClose={()=>setShowAdd(false)}/>}
    {copyId&&<CopyModal prop={props.find(p=>p.id===copyId)||null} onCopy={doCopy} onClose={()=>setCopyId(null)}/>}
    {deleteId&&<DeleteConfirm
      prop={props.find(p=>p.id===deleteId)||null}
      onConfirm={()=>{del(deleteId);setDeleteId(null);}}
      onClose={()=>setDeleteId(null)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
