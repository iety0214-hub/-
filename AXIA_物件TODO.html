<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AXIA JAPAN｜物件TODOリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --navy2: #1a2e45;
  --gold: #e8b84b;
  --gold2: #f5d07a;
  --white: #f8f5ef;
  --gray: #8a9bb0;
  --green: #2ecc7a;
  --green-bg: rgba(46,204,122,0.12);
  --red: #ff5757;
  --red-bg: rgba(255,87,87,0.12);
  --warn: #ffb347;
  --warn-bg: rgba(255,179,71,0.12);
  --card-bg: #152236;
  --border: rgba(232,184,75,0.18);
  --radius: 14px;
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── ヘッダー ── */
.header {
  background: linear-gradient(135deg, #0d1b2a 0%, #1a2e45 100%);
  border-bottom: 1px solid var(--border);
  padding: 18px 16px 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.12em; font-family: var(--mono); }
.header-title { font-size: 17px; font-weight: 900; color: var(--white); }
.save-badge {
  background: var(--green-bg); border: 1px solid var(--green);
  color: var(--green); font-size: 10px; padding: 3px 8px; border-radius: 20px;
  font-weight: 700; font-family: var(--mono); opacity: 0; transition: opacity 0.4s;
}
.save-badge.show { opacity: 1; }

/* ── タブ ── */
.tabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  border: 1px solid rgba(255,255,255,0.1); color: var(--gray);
  background: rgba(255,255,255,0.04); white-space: nowrap;
}
.tab.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }

/* ── 統計バー ── */
.stats-bar {
  display: flex; gap: 10px; padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 12px;
}
.stat-num { font-size: 20px; font-weight: 900; font-family: var(--mono); color: var(--gold); }
.stat-label { font-size: 10px; color: var(--gray); font-weight: 500; line-height: 1.2; }

/* ── カード ── */
.property-list { padding: 12px 12px 0; display: flex; flex-direction: column; gap: 10px; }

.property-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}
.property-card.all-done { border-color: rgba(46,204,122,0.4); }
.property-card.has-warn { border-color: rgba(255,179,71,0.4); }
.property-card.not-started { border-color: rgba(255,87,87,0.3); }

.card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer;
  user-select: none;
}
.progress-ring { flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
.card-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.meta-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  font-family: var(--mono);
}
.tag-date { background: rgba(232,184,75,0.15); color: var(--gold); }
.tag-buyer { background: rgba(248,245,239,0.08); color: var(--gray); }
.tag-warn { background: var(--warn-bg); color: var(--warn); }
.tag-sbj { background: rgba(100,160,255,0.15); color: #64a0ff; }
.tag-master { background: rgba(180,100,255,0.15); color: #b464ff; }

.chevron {
  flex-shrink: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  color: var(--gray); transition: transform 0.3s;
  font-size: 12px;
}
.card-header.open .chevron { transform: rotate(180deg); }

/* ── チェックリスト ── */
.checklist { display: none; padding: 0 14px 14px; }
.checklist.open { display: block; }

.section-label {
  font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em;
  text-transform: uppercase; padding: 10px 0 6px; font-family: var(--mono);
  border-top: 1px solid var(--border); margin-top: 8px;
}
.section-label:first-child { border-top: none; margin-top: 0; }

.check-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; user-select: none;
  transition: background 0.1s;
  border-radius: 8px;
  padding-left: 4px; padding-right: 4px;
}
.check-row:last-child { border-bottom: none; }
.check-row:active { background: rgba(255,255,255,0.04); }

.check-btn {
  flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 2px solid;
}
.check-btn.done { background: var(--green-bg); border-color: var(--green); }
.check-btn.undone { background: var(--red-bg); border-color: var(--red); }
.check-btn.warn { background: var(--warn-bg); border-color: var(--warn); }

.check-btn:active { transform: scale(0.88); }

.check-label { flex: 1; font-size: 13px; font-weight: 500; }
.check-label.done-text { color: var(--gray); text-decoration: line-through; }

/* メモ欄 */
.memo-label { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; margin: 10px 0 4px; display: block; font-family: var(--mono); }
.memo-area {
  width: 100%; padding: 8px 10px;
  background: rgba(255,255,255,0.06); border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 12px; color: var(--warn); font-weight: 500; line-height: 1.6;
  font-family: var(--font); resize: none; outline: none; min-height: 56px; box-sizing: border-box;
}
.memo-area:focus { border-color: var(--gold); color: var(--white); }
.memo-area::placeholder { color: rgba(138,155,176,0.5); }

/* 金消日 */
.kinshoki-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.kinshoki-label { font-size: 12px; color: var(--gray); flex-shrink: 0; }
.kinshoki-val { font-size: 13px; font-weight: 700; color: var(--gold); font-family: var(--mono); }

/* ── プログレスリング ── */
svg.ring { transform: rotate(-90deg); }

/* ── フィルター ── */
.filter-bar {
  display: flex; gap: 6px; padding: 10px 12px 0; overflow-x: auto; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 700; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.12); color: var(--gray);
  background: transparent; transition: all 0.2s;
}
.filter-btn.active { background: var(--navy2); border-color: var(--gold); color: var(--gold); }

/* ── FAB（保存ボタン） ── */
.fab {
  position: fixed; bottom: 24px; right: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(232,184,75,0.4);
  transition: transform 0.2s, box-shadow 0.2s; z-index: 200;
  border: none; color: var(--navy);
}
.fab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(232,184,75,0.3); }

/* hidden */
[data-hidden="true"] { display: none !important; }

/* ── FABグループ ── */
.fab-group { position: fixed; bottom: 24px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; z-index: 200; }
.fab-add {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(232,184,75,0.4);
  transition: transform 0.2s, box-shadow 0.2s; border: none; color: var(--navy);
}
.fab-add:active { transform: scale(0.92); }

/* ── モーダルオーバーレイ ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(5,12,22,0.85); backdrop-filter: blur(6px);
  z-index: 300; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal-sheet {
  background: #182b42;
  border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border);
  width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  padding: 0 0 40px;
  animation: slideUp 0.3s cubic-bezier(0.34,1.26,0.64,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-handle {
  width: 40px; height: 4px; background: rgba(255,255,255,0.2);
  border-radius: 2px; margin: 12px auto 0;
}
.modal-title {
  font-size: 16px; font-weight: 900; color: var(--white);
  padding: 16px 20px 4px; text-align: center;
}
.modal-sub { font-size: 11px; color: var(--gray); text-align: center; padding-bottom: 16px; }

/* フォーム */
.form-group { padding: 0 16px 14px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 6px; display: block; font-family: var(--mono); }
.form-input, .form-select {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; color: var(--white);
  font-size: 14px; font-family: var(--font); outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--gold); }
.form-input::placeholder { color: var(--gray); }

.form-select option { background: #182b42; color: var(--white); }

.tag-checks { display: flex; gap: 8px; flex-wrap: wrap; }
.tag-check-btn {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  border: 1px solid rgba(255,255,255,0.15); color: var(--gray); background: transparent;
  cursor: pointer; transition: all 0.2s;
}
.tag-check-btn.active-sbj    { background: rgba(100,160,255,0.2); border-color: #64a0ff; color: #64a0ff; }
.tag-check-btn.active-master { background: rgba(180,100,255,0.2); border-color: #b464ff; color: #b464ff; }

.modal-actions { display: flex; gap: 10px; padding: 8px 16px 0; }
.btn-cancel {
  flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: var(--gray); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: var(--font);
}
.btn-submit {
  flex: 2; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--navy); font-size: 14px; font-weight: 900;
  cursor: pointer; font-family: var(--font);
  transition: transform 0.15s;
}
.btn-submit:active { transform: scale(0.97); }

/* 削除ボタン（カード内） */
.delete-btn {
  font-size: 11px; color: var(--red); border: 1px solid rgba(255,87,87,0.3);
  background: transparent; border-radius: 8px; padding: 4px 10px;
  cursor: pointer; margin-top: 10px; font-family: var(--font); font-weight: 700;
}
.delete-btn:active { background: var(--red-bg); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">AXIA JAPAN</div>
      <div class="header-title">物件TODOリスト</div>
    </div>
    <div class="save-badge" id="saveBadge">✓ 保存済み</div>
  </div>
  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="all">📋 全物件</div>
    <div class="tab" data-tab="sbj">🏦 SBJ</div>
    <div class="tab" data-tab="master">🏢 自社物件</div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="undone">🔴 未対応あり</button>
  <button class="filter-btn" data-filter="done">🟢 完了</button>
  <button class="filter-btn" data-filter="warn">⚠️ 要確認</button>
</div>

<div class="property-list" id="propertyList"></div>

<div class="fab-group">
  <button class="fab-add" id="fabAdd" title="物件を追加">＋</button>
</div>

<!-- 物件追加モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🏠 新しい物件を追加</div>
    <div class="modal-sub">入力後「追加する」を押すと即反映されます</div>
    <div class="form-group">
      <label class="form-label">物件名 *</label>
      <input class="form-input" id="f_name" placeholder="例: MAXIV新川崎502" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">決済日</label>
      <input class="form-input" id="f_date" placeholder="例: 4/28" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">買主様</label>
      <input class="form-input" id="f_buyer" placeholder="例: 山田 太郎" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">金消日</label>
      <input class="form-input" id="f_kinshoki" placeholder="例: 4/25(土) 13:00" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">メモ・特記事項</label>
      <input class="form-input" id="f_memo" placeholder="例: 減額50万、口座振替書なし" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">タグ（複数選択可）</label>
      <div class="tag-checks">
        <button class="tag-check-btn" id="tag_sbj" data-tag="sbj">🏦 SBJ案件</button>
        <button class="tag-check-btn" id="tag_master" data-tag="master">🏢 自社物件</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">キャンセル</button>
      <button class="btn-submit" id="modalSubmit">＋ 追加する</button>
    </div>
  </div>
</div>

// ══════════════════════════════════════════
// State & Storage
// ══════════════════════════════════════════
const STORAGE_KEY = "axia_todo_v2";

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  // 初期状態
  const state = {};
  PROPERTIES_MASTER.forEach(p => {
    state[p.id] = { checks: { ...p.checks } };
  });
  return state;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const badge = document.getElementById("saveBadge");
  badge.classList.add("show");
  setTimeout(() => badge.classList.remove("show"), 2000);
}

let state = loadState();
// 初回はマスタデータで初期化（既存キーは保持）
PROPERTIES_MASTER.forEach(p => {
  if (!state[p.id]) state[p.id] = { checks: { ...p.checks } };
});

// ══════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════
function getChecks(propId) {
  return state[propId].checks;
}

function countProgress(propId) {
  const checks = getChecks(propId);
  const vals = Object.values(checks);
  const done = vals.filter(v => v === true).length;
  const total = vals.length;
  const checkWarn = vals.includes("warn");
  // メモに⚠️が含まれているかも判定
  const memo = state[propId] && state[propId].memo != null ? state[propId].memo : "";
  const hasWarn = checkWarn || memo.includes("⚠️");
  return { done, total, hasWarn };
}

function getCardClass(propId) {
  const { done, total, hasWarn } = countProgress(propId);
  if (hasWarn) return "has-warn";
  if (done === total) return "all-done";
  if (done === 0) return "not-started";
  return "";
}

// ── SVGリング ──
function makeRing(done, total, size=44) {
  const r = size/2 - 5;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? done/total : 0;
  const dash = circ * pct;
  const color = pct === 1 ? "#2ecc7a" : pct > 0.6 ? "#e8b84b" : pct > 0 ? "#ff9f43" : "#ff5757";
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray 0.4s ease"/>
    <text x="${size/2}" y="${size/2+5}" text-anchor="middle" fill="${color}" font-size="11" font-family="DM Mono,monospace" font-weight="700" style="transform:rotate(90deg);transform-origin:${size/2}px ${size/2}px">${done}/${total}</text>
  </svg>`;
}

// ══════════════════════════════════════════
// Render
// ══════════════════════════════════════════
let currentTab = "all";
let currentFilter = "all";

function renderStats() {
  const total = PROPERTIES_MASTER.length;
  let done = 0, warn = 0, active = 0;
  PROPERTIES_MASTER.forEach(p => {
    const { done: d, total: t, hasWarn } = countProgress(p.id);
    if (hasWarn) warn++;
    else if (d === t) done++;
    else active++;
  });
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-chip"><div class="stat-num">${total}</div><div class="stat-label">全物件</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">完了</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--warn)">${warn}</div><div class="stat-label">要確認</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--red)">${active}</div><div class="stat-label">対応中</div></div>
  `;
}

function shouldShow(p) {
  // タブフィルター
  if (currentTab === "sbj" && !p.tags.includes("sbj")) return false;
  if (currentTab === "master" && !p.tags.includes("master")) return false;

  // 状態フィルター
  if (currentFilter !== "all") {
    const { done, total, hasWarn } = countProgress(p.id);
    if (currentFilter === "done" && done !== total) return false;
    if (currentFilter === "undone" && (done === total)) return false;
    if (currentFilter === "warn" && !hasWarn) return false;
  }
  return true;
}

function renderList() {
  const list = document.getElementById("propertyList");
  const visible = PROPERTIES_MASTER.filter(shouldShow);

  if (visible.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--gray);font-size:14px;">該当する物件がありません</div>`;
    return;
  }

  list.innerHTML = visible.map(p => renderCard(p)).join("");

  // イベント
  visible.forEach(p => {
    // カードヘッダー
    document.getElementById(`hdr-${p.id}`).addEventListener("click", () => toggleCard(p.id));
    // チェックボタン
    Object.keys(p.checks).forEach(key => {
      const btn = document.getElementById(`chk-${p.id}-${key}`);
      if (btn) btn.addEventListener("click", (e) => { e.stopPropagation(); toggleCheck(p.id, key); });
    });
  });
}

function renderCard(p) {
  const { done, total } = countProgress(p.id);
  const cls = getCardClass(p.id);

  const tagHtml = [
    p.date ? `<span class="meta-tag tag-date">📅 決済 ${p.date}</span>` : "",
    p.buyer ? `<span class="meta-tag tag-buyer">👤 ${p.buyer}</span>` : "",
    p.tags.includes("sbj") ? `<span class="meta-tag tag-sbj">SBJ</span>` : "",
    p.tags.includes("master") ? `<span class="meta-tag tag-master">マスタリース</span>` : "",
    (p.memo && p.memo.includes("⚠️")) ? `<span class="meta-tag tag-warn">要確認</span>` : "",
  ].filter(Boolean).join("");

  return `<div class="property-card ${cls}" id="card-${p.id}">
    <div class="card-header" id="hdr-${p.id}">
      <div class="progress-ring">${makeRing(done, total)}</div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-meta">${tagHtml}</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="checklist" id="cl-${p.id}">
      ${renderChecklist(p)}
    </div>
  </div>`;
}

function renderChecklist(p) {
  const checks = getChecks(p.id);
  let html = "";

  // 金消日
  if (p.kinshoki) {
    html += `<div class="kinshoki-row">
      <span class="kinshoki-label">⏰ 金消日</span>
      <span class="kinshoki-val">${p.kinshoki}</span>
    </div>`;
  }

  Object.entries(SECTIONS).forEach(([secKey, sec]) => {
    html += `<div class="section-label">${sec.label}</div>`;
    sec.keys.forEach(key => {
      const val = checks[key];
      const isDone = val === true;
      const isWarn = val === "warn";
      const btnClass = isWarn ? "warn" : (isDone ? "done" : "undone");
      const icon = isWarn ? "⚠️" : (isDone ? "✅" : "❌");
      const labelClass = isDone ? "check-label done-text" : "check-label";
      html += `<div class="check-row" id="row-${p.id}-${key}">
        <div class="check-btn ${btnClass}" id="chk-${p.id}-${key}">${icon}</div>
        <div class="${labelClass}">${CHECK_LABELS[key]}</div>
      </div>`;
    });
  });

  const memoVal = (state[p.id] && state[p.id].memo != null) ? state[p.id].memo : (p.memo || "");
  html += `<div>
    <span class="memo-label">📌 メモ・特記事項</span>
    <textarea class="memo-area" id="memo-${p.id}" placeholder="メモを入力（⚠️を含めると要確認になります）">${memoVal}</textarea>
  </div>`;

  return html;
}

// ══════════════════════════════════════════
// Actions
// ══════════════════════════════════════════
const openCards = new Set();

function toggleCard(id) {
  const hdr = document.getElementById(`hdr-${id}`);
  const cl  = document.getElementById(`cl-${id}`);
  if (openCards.has(id)) {
    openCards.delete(id);
    hdr.classList.remove("open");
    cl.classList.remove("open");
  } else {
    openCards.add(id);
    hdr.classList.add("open");
    cl.classList.add("open");
  }
}

function toggleCheck(propId, key) {
  const checks = getChecks(propId);
  const cur = checks[key];
  // ❌(false) → ✅(true) → ⚠️("warn") → ❌(false) の3段階
  if (cur === false)       checks[key] = true;
  else if (cur === true)   checks[key] = "warn";
  else                     checks[key] = false;
  saveState();

  // ── チェックボタンのみ更新（カードを再描画しない）
  const btn = document.getElementById(`chk-${propId}-${key}`);
  const row = document.getElementById(`row-${propId}-${key}`);
  const newVal = checks[key];
  const isDone = newVal === true;
  const isWarn = newVal === "warn";

  btn.className = `check-btn ${isWarn ? "warn" : isDone ? "done" : "undone"}`;
  btn.textContent = isWarn ? "⚠️" : isDone ? "✅" : "❌";
  row.querySelector(".check-label").className = isDone ? "check-label done-text" : "check-label";

  // プログレスリング更新
  const { done, total } = countProgress(propId);
  document.querySelector(`#card-${propId} .progress-ring`).innerHTML = makeRing(done, total);

  // カードクラス更新
  const card = document.getElementById(`card-${propId}`);
  card.className = `property-card ${getCardClass(propId)}`;

  // 統計更新
  renderStats();
}

// ══════════════════════════════════════════
// 物件追加ロジック
// ══════════════════════════════════════════
// 動的物件リスト（masterのコピー＋追加分）
let dynamicProperties = JSON.parse(JSON.stringify(PROPERTIES_MASTER));

// stateにないIDを動的物件リストから復元
function loadDynamicProperties() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY + "_props");
    if (saved) {
      const extra = JSON.parse(saved);
      extra.forEach(p => {
        if (!dynamicProperties.find(x => x.id === p.id)) {
          dynamicProperties.push(p);
        }
      });
    }
  } catch(e) {}
}
loadDynamicProperties();

function saveDynamicProperties() {
  // MASTERにないIDだけ保存
  const masterIds = new Set(PROPERTIES_MASTER.map(p => p.id));
  const extra = dynamicProperties.filter(p => !masterIds.has(p.id));
  localStorage.setItem(STORAGE_KEY + "_props", JSON.stringify(extra));
}

function addProperty(data) {
  const id = "p_" + Date.now();
  const defaultChecks = {
    gmo_send:false,gmo_cert:false,toroki:false,shorui_umu:false,seikyu:false,
    kinshoki_share:false,eigyo_to:false,eigyo_from:false,suikama:false,
    hoken_iraishita:false,hoken_juryou:false,hoken_eigyo:false,
    tatekam_soroi:false, honin:false,dansin:false
  };
  const newProp = { id, ...data, checks: { ...defaultChecks } };
  dynamicProperties.push(newProp);
  state[id] = { checks: { ...defaultChecks } };
  saveDynamicProperties();
  saveState();
  return id;
}

function deleteProperty(id) {
  const masterIds = new Set(PROPERTIES_MASTER.map(p => p.id));
  if (masterIds.has(id)) { alert("初期データの物件は削除できません"); return; }
  dynamicProperties = dynamicProperties.filter(p => p.id !== id);
  delete state[id];
  saveDynamicProperties();
  saveState();
  renderStats();
  renderList();
}

// renderList/renderCard を dynamicProperties ベースに切替
function shouldShowDynamic(p) {
  if (currentTab === "sbj"    && !p.tags.includes("sbj"))    return false;
  if (currentTab === "master" && !p.tags.includes("master")) return false;
  if (currentFilter !== "all") {
    const { done, total, hasWarn } = countProgress(p.id);
    if (currentFilter === "done"   && done !== total)  return false;
    if (currentFilter === "undone" && done === total)   return false;
    if (currentFilter === "warn"   && !hasWarn)         return false;
  }
  return true;
}

// override renderList to use dynamicProperties
function renderList() {
  const list = document.getElementById("propertyList");
  const visible = dynamicProperties.filter(shouldShowDynamic);
  if (visible.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--gray);font-size:14px;">該当する物件がありません</div>`;
    return;
  }
  list.innerHTML = visible.map(p => renderCard(p)).join("");
  visible.forEach(p => {
    document.getElementById(`hdr-${p.id}`).addEventListener("click", () => toggleCard(p.id));
    Object.keys(p.checks || {}).forEach(key => {
      const btn = document.getElementById(`chk-${p.id}-${key}`);
      if (btn) btn.addEventListener("click", (e) => { e.stopPropagation(); toggleCheck(p.id, key); });
    });
    const delBtn = document.getElementById(`del-${p.id}`);
    if (delBtn) delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (confirm(`「${p.name}」を削除しますか？`)) deleteProperty(p.id);
    });
    // メモ入力イベント
    const memoEl = document.getElementById(`memo-${p.id}`);
    if (memoEl) {
      memoEl.addEventListener("input", (e) => {
        e.stopPropagation();
        if (!state[p.id]) state[p.id] = { checks: { ...p.checks } };
        state[p.id].memo = memoEl.value;
        saveState();
        // ⚠️含有でカードクラス・統計を更新
        const card = document.getElementById(`card-${p.id}`);
        if (card) card.className = `property-card ${getCardClass(p.id)}`;
        renderStats();
      });
      memoEl.addEventListener("click", (e) => e.stopPropagation());
    }
  });
}

// override renderStats
function renderStats() {
  const total = dynamicProperties.length;
  let done = 0, warn = 0, active = 0;
  dynamicProperties.forEach(p => {
    if (!state[p.id]) state[p.id] = { checks: { ...p.checks } };
    const { done: d, total: t, hasWarn } = countProgress(p.id);
    if (hasWarn) warn++;
    else if (d === t) done++;
    else active++;
  });
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-chip"><div class="stat-num">${total}</div><div class="stat-label">全物件</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">完了</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--warn)">${warn}</div><div class="stat-label">要確認</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--red)">${active}</div><div class="stat-label">対応中</div></div>
  `;
}

// renderCard に削除ボタンを追加（checklist末尾）
const _origRenderCard = renderCard;
function renderCard(p) {
  // ステートがなければ初期化
  if (!state[p.id]) state[p.id] = { checks: { ...p.checks } };
  const { done, total } = countProgress(p.id);
  const cls = getCardClass(p.id);
  const masterIds = new Set(PROPERTIES_MASTER.map(x => x.id));
  const canDelete = !masterIds.has(p.id);

  const tagHtml = [
    p.date ? `<span class="meta-tag tag-date">📅 決済 ${p.date}</span>` : "",
    p.buyer ? `<span class="meta-tag tag-buyer">👤 ${p.buyer}</span>` : "",
    p.tags.includes("sbj")    ? `<span class="meta-tag tag-sbj">SBJ</span>`        : "",
    p.tags.includes("master") ? `<span class="meta-tag tag-master">マスタリース</span>` : "",
    (p.memo && p.memo.includes("⚠️")) ? `<span class="meta-tag tag-warn">要確認</span>` : "",
  ].filter(Boolean).join("");

  const deleteHtml = canDelete
    ? `<button class="delete-btn" id="del-${p.id}">🗑 この物件を削除</button>`
    : "";

  return `<div class="property-card ${cls}" id="card-${p.id}">
    <div class="card-header" id="hdr-${p.id}">
      <div class="progress-ring">${makeRing(done, total)}</div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-meta">${tagHtml}</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="checklist" id="cl-${p.id}">
      ${renderChecklist(p)}
      ${deleteHtml}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// Init & Events
// ══════════════════════════════════════════
document.getElementById("tabBar").addEventListener("click", e => {
  const tab = e.target.closest("[data-tab]");
  if (!tab) return;
  currentTab = tab.dataset.tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  renderList();
  renderStats();
});

document.getElementById("filterBar").addEventListener("click", e => {
  const btn = e.target.closest("[data-filter]");
  if (!btn) return;
  currentFilter = btn.dataset.filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
});

// ── モーダル開閉 ──
const overlay = document.getElementById("modalOverlay");
let selectedTags = [];

document.getElementById("fabAdd").addEventListener("click", () => {
  // フォームリセット
  ["f_name","f_date","f_buyer","f_kinshoki","f_memo"].forEach(id => document.getElementById(id).value = "");
  selectedTags = [];
  document.querySelectorAll(".tag-check-btn").forEach(b => b.className = "tag-check-btn");
  overlay.classList.add("open");
  setTimeout(() => document.getElementById("f_name").focus(), 300);
});

document.getElementById("modalCancel").addEventListener("click", () => overlay.classList.remove("open"));
overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("open"); });

// タグ選択
document.querySelectorAll(".tag-check-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const tag = btn.dataset.tag;
    if (selectedTags.includes(tag)) {
      selectedTags = selectedTags.filter(t => t !== tag);
      btn.className = "tag-check-btn";
    } else {
      selectedTags.push(tag);
      btn.className = `tag-check-btn active-${tag}`;
    }
  });
});

// 追加実行
document.getElementById("modalSubmit").addEventListener("click", () => {
  const name = document.getElementById("f_name").value.trim();
  if (!name) { document.getElementById("f_name").focus(); return; }

  addProperty({
    name,
    date:     document.getElementById("f_date").value.trim(),
    buyer:    document.getElementById("f_buyer").value.trim(),
    kinshoki: document.getElementById("f_kinshoki").value.trim(),
    memo:     document.getElementById("f_memo").value.trim(),
    tags:     [...selectedTags],
  });

  overlay.classList.remove("open");
  if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
  renderStats();
  renderList();

  // 追加した物件カードを開く（最後尾）
  const lastProp = dynamicProperties[dynamicProperties.length - 1];
  setTimeout(() => {
    const card = document.getElementById(`card-${lastProp.id}`);
    if (card) { card.scrollIntoView({ behavior: "smooth", block: "center" }); toggleCard(lastProp.id); }
  }, 200);
});

// 初期レンダリング
renderStats();
renderList();
</script>
