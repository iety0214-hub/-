function useDebounceCallback(fn, delay) {
  const timerRef = useRef({});
  const fnRef = useRef(fn);
  fnRef.current = fn;
  return useCallback((id, ...args) => {
    if (timerRef.current[id]) clearTimeout(timerRef.current[id]);
    timerRef.current[id] = setTimeout(() => {
      fnRef.current(id, ...args);
      delete timerRef.current[id];
    }, delay);
  }, [delay]);
}

// 自分の更新を追跡するフラグ（Realtime受信時に無視するため）

let _myUpdateTimer = null;
function markMyUpdate(id) {
  _myUpdateIds.add(String(id));
  clearTimeout(_myUpdateTimer);
  _myUpdateTimer = setTimeout(() => _myUpdateIds.clear(), 3000);
}
function isMyUpdate(id) {
  return _myUpdateIds.has(String(id));
}

// カンマフォーマット
// ══════════════════════════════════════
function formatComma(val) {
  if (!val) return '';
  const raw = String(val).replace(/[,，]/g, '');
  // 数字のみならカンマ区切り
  if (/^\d+$/.test(raw)) {
    return Number(raw).toLocaleString();
  }
  return val;
}
function stripComma(val) {
  return String(val || '').replace(/[,，]/g, '');
}

function loadSettings() {
  try {
    const s = localStorage.getItem(SK_SETTINGS);
    if (s) return { ...DEFAULT_SETTINGS, ...JSON.parse(s) };
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
}
function saveSettings(s) { localStorage.setItem(SK_SETTINGS, JSON.stringify(s)); }

async function loadPropsFromDB() {
  try {
    const { data, error } = await supabase.from(TABLE_NAME).select('*').order('created_at', { ascending: true });
    if (error) throw error;
    return (data || []).map(row => ({
      id:         String(row.id),
      name:       row.name || '',
      fields:     row.fields || {},
      tab:        row.tab || '',
      sbjVisible: row.sbj_visible || false,
      warnMemos:  row.warn_memos || {},
      checks:     row.checks || {},
    }));
  } catch(e) { console.error('loadProps error:', e); return []; }
}

async function addPropToDB(prop) {
  try {
    const { data, error } = await supabase.from(TABLE_NAME).insert([{
      name:        prop.name,
      fields:      prop.fields,
      tab:         prop.tab,
      sbj_visible: prop.sbjVisible,
      warn_memos:  prop.warnMemos,
      checks:      prop.checks,
    }]).select().single();
    if (error) throw error;
    return String(data.id);
  } catch(e) { console.error('addProp error:', e); return prop.id; }
}

async function updatePropInDB(id, patch) {
  try {
    const dbPatch = {};
    if (patch.name       !== undefined) dbPatch.name        = patch.name;
    if (patch.fields     !== undefined) dbPatch.fields      = patch.fields;
    if (patch.tab        !== undefined) dbPatch.tab         = patch.tab;
    if (patch.sbjVisible !== undefined) dbPatch.sbj_visible = patch.sbjVisible;
    if (patch.warnMemos  !== undefined) dbPatch.warn_memos  = patch.warnMemos;
    if (patch.checks     !== undefined) dbPatch.checks      = patch.checks;
    if (Object.keys(dbPatch).length === 0) return;
    markMyUpdate(id);
    const { error } = await supabase.from(TABLE_NAME).update(dbPatch).eq('id', Number(id));
    if (error) throw error;
  } catch(e) { console.error('updateProp error:', e); }
}

async function deletePropFromDB(id) {
  try {
    const { error } = await supabase.from(TABLE_NAME).delete().eq('id', Number(id));
    if (error) throw error;
  } catch(e) { console.error('deleteProp error:', e); }
}

function genId() { return '_' + Math.random().toString(36).slice(2, 10); }

function calcProgress(checks, settings, sbjVisible) {
  const keys = settings.sections.flatMap(s => s.items.map(i => i.key));
  if (settings.sbjSection.enabled && sbjVisible) {
    keys.push(...settings.sbjSection.items.map(i => i.key));
  }
  const done    = keys.filter(k => (checks[k] ?? false) === true).length;
  const total   = keys.length;
  const hasWarn = keys.some(k => (checks[k] ?? false) === 'warn');
  return { done, total, hasWarn };
}

function makeChecks(settings) {
  const obj = {};
  settings.sections.forEach(s => s.items.forEach(i => { obj[i.key] = false; }));
  settings.sbjSection.items.forEach(i => { obj[i.key] = false; });
  return obj;
}

// ══════════════════════════════════════
// Ring
// ══════════════════════════════════════
function Ring({ done, total }) {
  const sz=44, r=sz/2-5, c=2*Math.PI*r, pct=total>0?done/total:0, d=c*pct;
  const col = pct===1?'#10b981':pct>.6?'#f59e0b':pct>0?'#f97316':'#ef4444';
  return (
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`} style={{transform:'rotate(-90deg)'}}>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#e8eeff" strokeWidth="4"/>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="4"
        strokeDasharray={`${d} ${c}`} strokeLinecap="round"/>
      <text x={sz/2} y={sz/2+5} textAnchor="middle" fill={col} fontSize="10"
        fontFamily="DM Mono,monospace" fontWeight="800"
        style={{transform:`rotate(90deg)`,transformOrigin:`${sz/2}px ${sz/2}px`}}>
        {done}/{total}
      </text>
    </svg>
  );
}

function CheckItem({ propId, item, value, warnMemo, onToggle, onWarnMemo }) {
  const done = value === true, warn = value === 'warn';
  const next = value === false ? true : value === true ? 'warn' : false;
  const icon = warn ? '⚠️' : done ? '✅' : '❌';
  const bg   = warn ? '#fff7ed' : done ? '#f0fdf4' : '#fef2f2';
  const bc   = warn ? '#f97316' : done ? '#10b981' : '#ef4444';
  const isAlert = item.label.startsWith('⚠️');

  // ⚠️メモ用ローカルstate + デバウンス
  const [localMemo, setLocalMemo] = useState(warnMemo || '');
  const memoTimer = useRef(null);
  useEffect(() => { setLocalMemo(warnMemo || ''); }, [warnMemo]);
  const handleMemoChange = (e) => {
    const v = e.target.value;
    setLocalMemo(v);
    clearTimeout(memoTimer.current);
    memoTimer.current = setTimeout(() => onWarnMemo(propId, item.key, v), 600);
  };

  return (
    <div>
      <div onClick={() => onToggle(propId, item.key, next)}
        style={{display:'flex',alignItems:'center',gap:10,padding:'9px 6px',borderBottom:'1px solid #f0f4ff',cursor:'pointer',borderRadius:8,background:isAlert?'#fffbeb':'transparent'}}>
        <div style={{flexShrink:0,width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,background:bg,border:`2px solid ${bc}`}}>{icon}</div>
        <div style={{flex:1,fontSize:13,fontWeight:isAlert?700:500,color:done?'#a0aec0':isAlert?'#92400e':'#1e2a4a',textDecoration:done?'line-through':'none'}}>{item.label}</div>
      </div>
      {warn && (
        <textarea value={localMemo} onChange={handleMemoChange}
          onClick={e=>e.stopPropagation()} placeholder="⚠️ 要確認の内容を入力…"
          style={{display:'block',width:'calc(100% - 42px)',marginLeft:42,marginBottom:4,padding:'7px 10px',borderRadius:8,background:'#fff7ed',border:'1px solid #fdba74',fontSize:12,color:'#c2410c',resize:'none',outline:'none',minHeight:40,lineHeight:1.5}}/>
      )}
    </div>
  );
}

// FieldInput（カードヘッダーのフィールド入力 - ローカルstate＋デバウンス）
// ══════════════════════════════════════
function FieldInput({ propId, field, value, onUpdate }) {
  const isComma = field.comma || false;
  const [localVal, setLocalVal] = useState(isComma ? formatComma(value) : (value || ''));
  const timerRef = useRef(null);
  const isFocused = useRef(false);

  // 外部（Realtime等）からの値変更をローカルに反映（フォーカス中は無視）
  useEffect(() => {
    if (!isFocused.current) {
      setLocalVal(isComma ? formatComma(value) : (value || ''));
    }
  }, [value, isComma]);

  const handleChange = (e) => {
    let v = e.target.value;
    if (isComma) {
      // 入力中は数字とカンマのみ許可、リアルタイムでカンマ付与
      const raw = v.replace(/[,，]/g, '');
      if (/^\d*$/.test(raw)) {
        v = raw ? Number(raw).toLocaleString() : '';
      }
    }
    setLocalVal(v);
    clearTimeout(timerRef.current);
    const saveVal = isComma ? stripComma(v) : v;
    timerRef.current = setTimeout(() => {
      onUpdate(propId, { fields: { [field.key]: saveVal } });
    }, 600);
  };

  const handleFocus = () => { isFocused.current = true; };
  const handleBlur = () => {
    isFocused.current = false;
    // blur時に即座にDB保存
    clearTimeout(timerRef.current);
    const saveVal = isComma ? stripComma(localVal) : localVal;
    onUpdate(propId, { fields: { [field.key]: saveVal } });
  };

  return (
    <input value={localVal}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      onClick={e=>e.stopPropagation()}
      placeholder={field.label}
      inputMode={isComma ? 'numeric' : 'text'}
      style={{background:'transparent',border:'none',outline:'none',fontSize:11,fontWeight:600,
        color: field.highlight ? '#92400e' : '#1e2a4a',
        width: field.width || 80, padding:0}}/>
  );
}

// ══════════════════════════════════════
// NameInput（物件名入力 - ローカルstate＋デバウンス）
// ══════════════════════════════════════
function NameInput({ propId, value, placeholder, onUpdate }) {
  const [localVal, setLocalVal] = useState(value || '');
  const timerRef = useRef(null);
  const isFocused = useRef(false);

  useEffect(() => {
    if (!isFocused.current) setLocalVal(value || '');
  }, [value]);

  const handleChange = (e) => {
    const v = e.target.value;
    setLocalVal(v);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      onUpdate(propId, { name: v });
    }, 600);
  };
  const handleFocus = () => { isFocused.current = true; };
  const handleBlur = () => {
    isFocused.current = false;
    clearTimeout(timerRef.current);
    onUpdate(propId, { name: localVal });
  };

  return (
    <input value={localVal} onChange={handleChange} onFocus={handleFocus} onBlur={handleBlur}
      placeholder={placeholder}
      style={{width:'100%',background:'#fff',border:'1px solid #c8d2f0',borderRadius:10,padding:'9px 12px',color:'#1e2a4a',fontSize:14,fontWeight:700,outline:'none'}}/>
  );
}

// Card
// ══════════════════════════════════════
function Card({ prop, settings, onUpdate, onDeleteReq, onCopyReq, onMoveReq }) {
  const [open, setOpen] = useState(false);
  const { done, total, hasWarn } = calcProgress(prop.checks, settings, prop.sbjVisible);
  const bc = hasWarn ? '#f97316' : done===total ? '#10b981' : done===0 ? '#fca5a5' : '#c8d2f0';

  const updCheck = (id, key, next) => onUpdate(id, { checks: { ...prop.checks, [key]: next } });
  const updMemo  = (id, key, val)  => onUpdate(id, { warnMemos: { ...(prop.warnMemos||{}), [key]: val } });

  // フィールド更新（既存fieldsとマージ）
  const updField = useCallback((id, patch) => {
    if (patch.fields) {
      onUpdate(id, { fields: { ...(prop.fields||{}), ...patch.fields } });
    } else {
      onUpdate(id, patch);
    }
  }, [onUpdate, prop.fields]);

  return (
    <div style={{background:'#fff',border:`1.5px solid ${bc}`,borderRadius:16,overflow:'hidden',marginBottom:10,boxShadow:'0 2px 12px rgba(200,169,74,.08)'}}>
      <div onClick={e => { if(e.target.closest('input')||e.target.closest('button')||e.target.closest('textarea'))return; setOpen(o=>!o); }}
        style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer',background:'#fff'}}>
        <Ring done={done} total={total}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,lineHeight:1.3,color:'#1e2a4a'}}>{prop.name||`（${settings.itemLabel}名未設定）`}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5,alignItems:'center'}}>
            {settings.sbjSection.enabled && (
              <span onClick={e=>{e.stopPropagation();onUpdate(prop.id,{sbjVisible:!prop.sbjVisible});}}
                style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',userSelect:'none',
                  background:prop.sbjVisible?'#4f6ef7':'#ffffff',
                  color:prop.sbjVisible?'#ffffff':'#a0aec0',
                  border:`1px solid ${prop.sbjVisible?'#4f6ef7':'#c8d2f0'}`,
                  boxShadow:prop.sbjVisible?'0 2px 8px rgba(79,110,247,0.35)':'none',
                  transition:'all .2s',gap:3}}>
                {prop.sbjVisible ? '✅ ON' : '⬜ OFF'}
              </span>
            )}
            {settings.fields.map(f => (
              <span key={f.key}
                style={{display:'inline-flex',alignItems:'center',gap:3,
                  background: f.highlight ? '#fef9ec' : '#f0f4ff',
                  border: `1px solid ${f.highlight ? '#c8a94a' : '#dde3f5'}`,
                  borderRadius:8,padding:'2px 6px 2px 7px',fontSize:11,
                  color: f.highlight ? '#92400e' : '#4a5680'}}>
                {f.icon}
                <FieldInput propId={prop.id} field={f} value={(prop.fields||{})[f.key]||''} onUpdate={updField}/>
              </span>
            ))}
          </div>
        </div>
        <div style={{flexShrink:0,fontSize:11,color:'#8a96b8',transition:'transform .3s',transform:open?'rotate(180deg)':'none'}}>▼</div>
      </div>

      {open && (
        <div style={{padding:'0 14px 6px',background:'#f7f9ff',borderTop:'1px solid #e8eeff'}}>
          {/* ▼ 移動・コピー・削除ボタン（物件名の上） */}
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,padding:'10px 0 8px'}}>
            <button onClick={e=>{e.stopPropagation();onMoveReq(prop.id);}}
              style={{padding:'7px 13px',borderRadius:9,border:'1px solid #dde3f5',background:'#f0f4ff',color:'#4a5680',fontSize:12,fontWeight:700}}>📂 移動</button>
            <button onClick={e=>{e.stopPropagation();onCopyReq(prop.id);}}
              style={{padding:'7px 13px',borderRadius:9,border:'1px solid #fcd34d',background:'#fef9ec',color:'#92400e',fontSize:12,fontWeight:700}}>📋 コピー</button>
            <button onClick={e=>{e.stopPropagation();onDeleteReq(prop.id);}}
              style={{padding:'7px 13px',borderRadius:9,border:'1px solid #fca5a5',background:'#fef2f2',color:'#ef4444',fontSize:12,fontWeight:700}}>🗑 削除</button>
          </div>

          <div style={{padding:'0 0 10px',borderBottom:'1px solid #e8eeff'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#c8a94a',marginBottom:5}}>🏠 {settings.itemLabel}名</div>
            <NameInput propId={prop.id} value={prop.name} placeholder={`${settings.itemLabel}名を入力`} onUpdate={onUpdate}/>
          </div>

          {settings.sections.map((sec,si) => (
            <div key={sec.id} style={{background:'#fff',borderRadius:10,margin:'10px 0',padding:'2px 10px',border:'1px solid #e8eeff'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#c8a94a',letterSpacing:'.07em',padding:'9px 0 5px'}}>{sec.label}</div>
              {sec.items.map(item => (
                <CheckItem key={item.key} propId={prop.id} item={item}
                  value={prop.checks[item.key]??false}
                  warnMemo={(prop.warnMemos||{})[item.key]||''}
                  onToggle={updCheck} onWarnMemo={updMemo}/>
              ))}
            </div>
          ))}

          {settings.sbjSection.enabled && prop.sbjVisible && (
            <div style={{background:'#fef9ec',borderRadius:10,margin:'10px 0',padding:'2px 10px',border:'1px solid #c8a94a44'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#92400e',letterSpacing:'.07em',padding:'9px 0 5px'}}>{settings.sbjSection.label}</div>
              {settings.sbjSection.items.map(item => (
                <CheckItem key={item.key} propId={prop.id} item={item}
                  value={prop.checks[item.key]??false}
                  warnMemo={(prop.warnMemos||{})[item.key]||''}
                  onToggle={updCheck} onWarnMemo={updMemo}/>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// App
// ══════════════════════════════════════
function App() {
  const [settings, setSettings] = useState(loadSettings);
  const [props,    setProps]    = useState([]);
  const [tab,      setTab]      = useState(() => loadSettings().tabs[0]?.key || '');
  const [filter,   setFilter]   = useState('all');
  const [screen,   setScreen]   = useState('main');
  const [saved,    setSaved]    = useState(false);
  const [loading,  setLoading]  = useState(true);
  const [showAdd,  setShowAdd]  = useState(false);
  const [deleteId, setDeleteId] = useState(null);
  const [copyId,   setCopyId]   = useState(null);
  const [moveId,   setMoveId]   = useState(null);

  // 初回ロード
  useEffect(() => {
    loadPropsFromDB().then(data => { setProps(data); setLoading(false); });
  }, []);

  // リアルタイム同期（自分の更新は無視）
  useEffect(() => {
    const channel = supabase.channel('axia_buken_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_NAME }, (payload) => {
        const changedId = payload.new?.id || payload.old?.id;
        // 自分の更新なら全データ再取得しない
        if (changedId && isMyUpdate(changedId)) return;
        loadPropsFromDB().then(data => setProps(data));
      }).subscribe();
    return () => supabase.removeChannel(channel);
  }, []);

  useEffect(() => { saveSettings(settings); }, [settings]);

  const showSaved = () => { setSaved(true); setTimeout(() => setSaved(false), 2000); };

  const handleSaveSettings = useCallback(draft => {
    setSettings(draft);
    if (!draft.tabs.find(t => t.key === tab)) setTab(draft.tabs[0]?.key || '');
    setScreen('main');
  }, [tab]);

  // DB書き込みをデバウンス（テキスト入力用: 600ms）
  const debouncedDBUpdate = useDebounceCallback((id, patch) => {
    updatePropInDB(id, patch).then(showSaved);
  }, 600);

  const upd = useCallback((id, patch) => {
    setProps(ps => ps.map(p => p.id===id ? {...p,...patch} : p));
    // テキスト系（name, fields, warnMemos）はデバウンス、それ以外は即座
    const isTextUpdate = patch.name !== undefined || patch.fields !== undefined || patch.warnMemos !== undefined;
    if (isTextUpdate) {
      debouncedDBUpdate(id, patch);
    } else {
      updatePropInDB(id, patch).then(showSaved);
    }
  }, [debouncedDBUpdate]);

  const del = useCallback(id => {
    setProps(ps => ps.filter(p => p.id !== id));
    deletePropFromDB(id).then(showSaved);
  }, []);

  const addProp = useCallback(async ({ name, fields, tab: t }) => {
    const tempId = genId();
    const newProp = { id:tempId, name, fields, tab:t, sbjVisible:false, warnMemos:{}, checks:makeChecks(settings) };
    setProps(ps => [...ps, newProp]);
    const realId = await addPropToDB(newProp);
    setProps(ps => ps.map(p => p.id===tempId ? {...p, id:realId} : p));
    setTab(t); setShowAdd(false); showSaved();
  }, [settings]);

  const doCopy = useCallback(async toTab => {
    const src = props.find(p => p.id===copyId); if (!src) return;
    const copy = { ...JSON.parse(JSON.stringify(src)), id:genId(), name:src.name+'（コピー）', tab:toTab };
    setProps(ps => [...ps, copy]);
    const realId = await addPropToDB(copy);
    setProps(ps => ps.map(p => p.id===copy.id ? {...p, id:realId} : p));
    setTab(toTab); setCopyId(null); showSaved();
  }, [props, copyId]);

  const doMove = useCallback(toTab => {
    setProps(ps => ps.map(p => p.id===moveId ? {...p, tab:toTab} : p));
    updatePropInDB(moveId, { tab: toTab }).then(showSaved);
    setTab(toTab); setMoveId(null);
  }, [moveId]);

  const visible = useMemo(() => props.filter(p => {
    if (p.tab !== tab) return false;
    if (filter === 'all') return true;
    const { done, total, hasWarn } = calcProgress(p.checks, settings, p.sbjVisible);
    if (filter==='done')   return done===total;
    if (filter==='undone') return done!==total;
    if (filter==='warn')   return hasWarn;
    return true;
  }), [props, tab, filter, settings]);

  const stats = useMemo(() => {
    let done=0, warn=0, active=0;
    props.forEach(p => {
      const { done:d, total:t, hasWarn } = calcProgress(p.checks, settings, p.sbjVisible);
      if (hasWarn) warn++; else if (d===t) done++; else active++;
    });
    return { total: props.length, done, warn, active };
  }, [props, settings]);

  if (screen === 'settings') {
    return <SettingsScreen settings={settings} onSave={handleSaveSettings} onClose={() => setScreen('main')}/>;
  }

  if (loading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#f0f4ff',gap:16}}>
        <div style={{width:48,height:48,border:'4px solid #e8eeff',borderTop:'4px solid #c8a94a',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
        <div style={{fontSize:14,color:'#8a96b8',fontWeight:600}}>データを読み込み中...</div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  return (
    <div style={{background:'#f0f4ff',minHeight:'100vh'}}>
      {/* ヘッダー */}
      <div style={{background:'linear-gradient(135deg,#1e2a4a,#2d3e6e)',padding:'16px 16px 12px',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 16px rgba(30,42,74,.35)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:'#c8a94a',letterSpacing:'.12em'}}>AXIA JAPAN</div>
            <div style={{fontSize:17,fontWeight:900,color:'#fff'}}>{settings.appTitle}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{background:'rgba(200,169,74,.3)',border:'1px solid rgba(200,169,74,.5)',color:'#e4c96a',fontSize:10,padding:'3px 8px',borderRadius:20,fontWeight:700,opacity:saved?1:0,transition:'opacity .4s'}}>✓ 保存済み</div>
            <button onClick={() => setScreen('settings')}
              style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.25)',borderRadius:9,padding:'6px 10px',color:'#fff',fontSize:13,fontWeight:700}}>⚙️</button>
          </div>
        </div>
        <div style={{display:'flex',gap:6,overflowX:'auto'}}>
          {settings.tabs.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              style={{flexShrink:0,padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:700,whiteSpace:'nowrap',
                border:`1px solid ${tab===t.key?'#c8a94a':'rgba(255,255,255,.2)'}`,
                background:tab===t.key?'#c8a94a':'rgba(255,255,255,.08)',
                color:tab===t.key?'#fff':'rgba(255,255,255,.8)'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* 統計バー */}
      <div style={{display:'flex',gap:8,padding:'10px 14px',background:'#fff',borderBottom:'1px solid #e8eeff',overflowX:'auto'}}>
        {[{n:stats.total,l:'全件',c:'#1e2a4a'},{n:stats.done,l:'完了',c:'#10b981'},{n:stats.warn,l:'要確認',c:'#f97316'},{n:stats.active,l:'対応中',c:'#ef4444'}].map(({n,l,c})=>(
          <div key={l} style={{flexShrink:0,display:'flex',alignItems:'center',gap:6,background:'#f7f9ff',border:`1.5px solid ${c}22`,borderRadius:10,padding:'6px 12px'}}>
            <div style={{fontSize:20,fontWeight:900,color:c,fontFamily:'DM Mono,monospace'}}>{n}</div>
            <div style={{fontSize:10,color:'#8a96b8',fontWeight:600}}>{l}</div>
          </div>
        ))}
      </div>

      {/* フィルター */}
      <div style={{display:'flex',gap:6,padding:'8px 12px',background:'#fff',borderBottom:'1px solid #e8eeff',overflowX:'auto'}}>
        {[['all','すべて'],['undone','🔴 未対応あり'],['done','🟢 完了'],['warn','⚠️ 要確認']].map(([k,l])=>(
          <button key={k} onClick={() => setFilter(k)}
            style={{flexShrink:0,padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,
              border:`1px solid ${filter===k?'#c8a94a':'#dde3f5'}`,
              background:filter===k?'#fef9ec':'transparent',
              color:filter===k?'#92400e':'#8a96b8'}}>
            {l}
          </button>
        ))}
      </div>

      {/* カードリスト */}
      <div style={{padding:'10px 12px 0'}}>
        {visible.length === 0
          ? <div style={{textAlign:'center',padding:'60px 20px',color:'#8a96b8',fontSize:14}}>
              <div style={{fontSize:40,marginBottom:12}}>🏠</div>
              該当する{settings.itemLabel}がありません
            </div>
          : visible.map(p => (
              <Card key={p.id} prop={p} settings={settings}
                onUpdate={upd} onDeleteReq={id=>setDeleteId(id)}
                onCopyReq={id=>setCopyId(id)} onMoveReq={id=>setMoveId(id)}/>
            ))
        }
      </div>

      {/* FAB */}
      <button onClick={() => setShowAdd(true)}
        style={{position:'fixed',bottom:24,right:20,width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,#c8a94a,#e4c96a)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,boxShadow:'0 4px 20px rgba(200,169,74,.5)',zIndex:200,border:'none',color:'#fff'}}>
        ＋
      </button>

      {showAdd   && <AddPropModal settings={settings} defaultTab={tab} onAdd={addProp} onClose={()=>setShowAdd(false)}/>}
      {moveId    && <MoveModal   prop={props.find(p=>p.id===moveId)||null}  settings={settings} onMove={doMove}  onClose={()=>setMoveId(null)}/>}
      {copyId    && <CopyModal   prop={props.find(p=>p.id===copyId)||null}  settings={settings} onCopy={doCopy}  onClose={()=>setCopyId(null)}/>}
      {deleteId  && <DeleteConfirm prop={props.find(p=>p.id===deleteId)||null} onConfirm={()=>{del(deleteId);setDeleteId(null);}} onClose={()=>setDeleteId(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
