<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo, useRef, useEffect } = React;

const SK_PROPS    = 'axia_todo_props_v1';
const SK_SETTINGS = 'axia_todo_settings_v1';

// ══════════════════════════════════════
// デフォルト設定
// ══════════════════════════════════════

      { key: 'exp_doc_permit', label: '建築確認済証・検査済証の添付確認' },
    ]},
  ],

    enabled: true,
    label: '🏢 マンション追加書類',

      { key: 'msn_rules',     label: '管理規約・使用細則の確認' },
      { key: 'msn_report',    label: '重要事項調査報告書（管理会社）' },

      { key: 'msn_arrears',   label: '管理費・修繕積立金の滞納有無' },
      { key: 'msn_history',   label: '大規模修繕の実施履歴・今後の予定' },
      { key: 'msn_minutes',   label: '管理組合議事録（直近3年分）確認' },

// ══════════════════════════════════════
// ストレージ
// ══════════════════════════════════════
function loadSettings() {
  try {
    const s = localStorage.getItem(SK_SETTINGS);
    if (s) return { ...DEFAULT_SETTINGS, ...JSON.parse(s) };
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
}
function saveSettings(s) { localStorage.setItem(SK_SETTINGS, JSON.stringify(s)); }
function loadProps() {
  try { const s = localStorage.getItem(SK_PROPS); if (s) return JSON.parse(s); } catch(e) {}
  return [];
}
function saveProps(ps) { localStorage.setItem(SK_PROPS, JSON.stringify(ps)); }

// ══════════════════════════════════════
// ヘルパー
// ══════════════════════════════════════
function genId() { return '_' + Math.random().toString(36).slice(2, 10); }

function calcProgress(checks, settings, sbjVisible) {
  const keys = settings.sections.flatMap(s => s.items.map(i => i.key));
  if (settings.sbjSection.enabled && sbjVisible) {
    keys.push(...settings.sbjSection.items.map(i => i.key));
  }
  const done    = keys.filter(k => (checks[k] ?? false) === true).length;
  const total   = keys.length;
  const hasWarn = keys.some(k => (checks[k] ?? false) === 'warn');
  return { done, total, hasWarn };
}

function makeChecks(settings) {
  const obj = {};
  settings.sections.forEach(s => s.items.forEach(i => { obj[i.key] = false; }));
  settings.sbjSection.items.forEach(i => { obj[i.key] = false; });
  return obj;
}

// ══════════════════════════════════════
// Ring
// ══════════════════════════════════════
function Ring({ done, total }) {
  const sz=44, r=sz/2-5, c=2*Math.PI*r, pct=total>0?done/total:0, d=c*pct;
  const col = pct===1?'#10b981':pct>.6?'#f59e0b':pct>0?'#f97316':'#ef4444';
  return (
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`} style={{transform:'rotate(-90deg)'}}>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#e8eeff" strokeWidth="4"/>
      <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="4"
        strokeDasharray={`${d} ${c}`} strokeLinecap="round"/>
      <text x={sz/2} y={sz/2+5} textAnchor="middle" fill={col} fontSize="10"
        fontFamily="DM Mono,monospace" fontWeight="800"
        style={{transform:`rotate(90deg)`,transformOrigin:`${sz/2}px ${sz/2}px`}}>
        {done}/{total}
      </text>
    </svg>
  );
}

// ══════════════════════════════════════
// Modal
// ══════════════════════════════════════
function Modal({ onClose, title, sub, children }) {
  return (
    <div onClick={onClose}
      style={{position:'fixed',inset:0,background:'rgba(30,42,74,0.45)',backdropFilter:'blur(4px)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div onClick={e => e.stopPropagation()}
        style={{background:'#fff',borderRadius:'24px 24px 0 0',borderTop:'3px solid #c8a94a',width:'100%',maxWidth:600,maxHeight:'92vh',overflowY:'auto',paddingBottom:40,boxShadow:'0 -8px 40px rgba(200,169,74,.18)'}}>
        <div style={{width:40,height:4,background:'#e0e7ff',borderRadius:2,margin:'12px auto 0'}}/>
        {title && <div style={{fontSize:16,fontWeight:900,padding:'14px 20px 4px',textAlign:'center',color:'#1e2a4a'}}>{title}</div>}
        {sub   && <div style={{fontSize:11,color:'#8a96b8',textAlign:'center',paddingBottom:12,padding:'0 20px 12px'}}>{sub}</div>}
        {children}
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// CheckItem
// ══════════════════════════════════════
function CheckItem({ propId, item, value, warnMemo, onToggle, onWarnMemo }) {
  const done = value === true, warn = value === 'warn';
  const next = value === false ? true : value === true ? 'warn' : false;
  const icon = warn ? '⚠️' : done ? '✅' : '❌';
  const bg   = warn ? '#fff7ed' : done ? '#f0fdf4' : '#fef2f2';
  const bc   = warn ? '#f97316' : done ? '#10b981' : '#ef4444';
  const isAlert = item.label.startsWith('⚠️');
  return (
    <div>
      <div onClick={() => onToggle(propId, item.key, next)}
        style={{display:'flex',alignItems:'center',gap:10,padding:'9px 6px',borderBottom:'1px solid #f0f4ff',cursor:'pointer',borderRadius:8,background:isAlert?'#fffbeb':'transparent'}}>
        <div style={{flexShrink:0,width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,background:bg,border:`2px solid ${bc}`}}>{icon}</div>
        <div style={{flex:1,fontSize:13,fontWeight:isAlert?700:500,color:done?'#a0aec0':isAlert?'#92400e':'#1e2a4a',textDecoration:done?'line-through':'none'}}>{item.label}</div>
      </div>
      {warn && (
        <textarea value={warnMemo||''} onChange={e=>onWarnMemo(propId,item.key,e.target.value)}
          onClick={e=>e.stopPropagation()} placeholder="⚠️ 要確認の内容を入力…"
          style={{display:'block',width:'calc(100% - 42px)',marginLeft:42,marginBottom:4,padding:'7px 10px',borderRadius:8,background:'#fff7ed',border:'1px solid #fdba74',fontSize:12,color:'#c2410c',resize:'none',outline:'none',minHeight:40,lineHeight:1.5}}/>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// 各モーダル
// ══════════════════════════════════════
function DeleteConfirm({ prop, onConfirm, onClose }) {
  if (!prop) return null;
  return (
    <Modal title="🗑 削除の確認" sub={`「${prop.name}」を削除しますか？`} onClose={onClose}>
      <div style={{display:'flex',gap:10,padding:'8px 16px 0'}}>
        <button onClick={onClose} style={{flex:1,padding:13,borderRadius:12,border:'1px solid #dde3f5',background:'#f0f4ff',color:'#4a5680',fontSize:14,fontWeight:700}}>キャンセル</button>
        <button onClick={onConfirm} style={{flex:1,padding:13,borderRadius:12,border:'none',background:'linear-gradient(135deg,#ef4444,#f87171)',color:'#fff',fontSize:14,fontWeight:900}}>削除する</button>
      </div>
    </Modal>
  );
}

function MoveModal({ prop, settings, onMove, onClose }) {
  if (!prop) return null;
  return (
    <Modal title="📂 タブを移動" sub={`「${prop.name}」の移動先を選んでください`} onClose={onClose}>
      <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:8}}>
        {settings.tabs.map(t => (
          <button key={t.key} onClick={() => onMove(t.key)}
            style={{width:'100%',padding:13,borderRadius:12,border:`1px solid ${t.key===prop.tab?'#c8a94a':'#dde3f5'}`,background:t.key===prop.tab?'#fef9ec':'#f7f9ff',color:t.key===prop.tab?'#92400e':'#1e2a4a',fontSize:14,fontWeight:700,textAlign:'left',opacity:t.key===prop.tab?.5:1,pointerEvents:t.key===prop.tab?'none':'auto'}}>
            {t.key===prop.tab ? '✓ 現在　' : ''}{t.label}
          </button>
        ))}
      </div>
      <div style={{padding:'10px 16px 0'}}>
        <button onClick={onClose} style={{width:'100%',padding:13,borderRadius:12,border:'1px solid #dde3f5',background:'#f0f4ff',color:'#4a5680',fontSize:14,fontWeight:700}}>キャンセル</button>
      </div>
    </Modal>
  );
}

function CopyModal({ prop, settings, onCopy, onClose }) {
  if (!prop) return null;
  return (
    <Modal title="📋 コピー先のタブを選択" sub={`「${prop.name}」のコピー先を選んでください`} onClose={onClose}>
      <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:8}}>
        {settings.tabs.map(t => (
          <button key={t.key} onClick={() => onCopy(t.key)}
            style={{width:'100%',padding:13,borderRadius:12,border:'1px solid #dde3f5',background:'#f7f9ff',color:'#1e2a4a',fontSize:14,fontWeight:700,textAlign:'left'}}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{padding:'10px 16px 0'}}>
        <button onClick={onClose} style={{width:'100%',padding:13,borderRadius:12,border:'1px solid #dde3f5',background:'#f0f4ff',color:'#4a5680',fontSize:14,fontWeight:700}}>キャンセル</button>
      </div>
    </Modal>
  );
}

function AddPropModal({ settings, defaultTab, onAdd, onClose }) {
  const [name, setName]   = useState('');
  const [fields, setFields] = useState(() => {
    const obj = {};
    settings.fields.forEach(f => { obj[f.key] = ''; });
    return obj;
  });
  const [tab, setTab] = useState(defaultTab || settings.tabs[0]?.key || '');
  const ref = useRef();
  useEffect(() => { setTimeout(() => ref.current?.focus(), 300); }, []);

  const submit = () => {
    if (!name.trim()) { ref.current?.focus(); return; }
    onAdd({ name: name.trim(), fields, tab });
  };

  return (
    <Modal title={`🏠 ${settings.itemLabel}を追加`} sub="入力後「追加する」を押すと即反映" onClose={onClose}>
      <div style={{padding:'0 16px 10px'}}>
        <label style={{fontSize:11,fontWeight:700,color:'#c8a94a',letterSpacing:'.06em',marginBottom:5,display:'block'}}>{settings.itemLabel}名 *</label>
        <input ref={ref} value={name} onChange={e=>setName(e.target.value)} placeholder={`${settings.itemLabel}名を入力`}
          style={{width:'100%',background:'#f0f4ff',border:'1px solid #c8d2f0',borderRadius:10,padding:'11px 12px',color:'#1e2a4a',fontSize:14,outline:'none'}}/>
      </div>
      {settings.fields.map(f => (
        <div key={f.key} style={{padding:'0 16px 10px'}}>
          <label style={{fontSize:11,fontWeight:700,color:'#c8a94a',letterSpacing:'.06em',marginBottom:5,display:'block'}}>{f.label}</label>
          <input value={fields[f.key]||''} onChange={e=>setFields(prev=>({...prev,[f.key]:e.target.value}))} placeholder={f.label}
            style={{width:'100%',background:'#f0f4ff',border:'1px solid #c8d2f0',borderRadius:10,padding:'11px 12px',color:'#1e2a4a',fontSize:14,outline:'none'}}/>
        </div>
      ))}
      <div style={{padding:'0 16px 12px'}}>
        <label style={{fontSize:11,fontWeight:700,color:'#c8a94a',letterSpacing:'.06em',marginBottom:8,display:'block'}}>タブ</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {settings.tabs.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${tab===t.key?'#c8a94a':'#dde3f5'}`,background:tab===t.key?'#fef9ec':'transparent',color:tab===t.key?'#92400e':'#8a96b8'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',gap:10,padding:'6px 16px 0'}}>
        <button onClick={onClose} style={{flex:1,padding:13,borderRadius:12,border:'1px solid #dde3f5',background:'#f0f4ff',color:'#4a5680',fontSize:14,fontWeight:700}}>キャンセル</button>
        <button onClick={submit} style={{flex:2,padding:13,borderRadius:12,border:'none',background:'linear-gradient(135deg,#c8a94a,#e4c96a)',color:'#fff',fontSize:14,fontWeight:900}}>＋ 追加する</button>
      </div>
    </Modal>
  );
}

// ══════════════════════════════════════
// 設定画面
// ══════════════════════════════════════
function SettingsScreen({ settings, onSave, onClose }) {
  const [d, setD] = useState(() => JSON.parse(JSON.stringify(settings)));
  const up = patch => setD(prev => ({ ...prev, ...patch }));

  const addTab    = () => up({ tabs: [...d.tabs, { key: genId(), label: '新しいタブ' }] });
  const updTab    = (i, label) => { const t=[...d.tabs]; t[i]={...t[i],label}; up({tabs:t}); };
  const delTab    = (i) => { if(d.tabs.length<=1)return; up({tabs:d.tabs.filter((_,idx)=>idx!==i)}); };

  const addField  = () => up({ fields: [...d.fields, { key: genId(), label: '新しいフィールド', icon: '📌', width: 80, highlight: false }] });
  const updField  = (i, patch) => { const f=d.fields.map((x,idx)=>idx===i?{...x,...patch}:x); up({fields:f}); };
  const delField  = (i) => up({ fields: d.fields.filter((_,idx)=>idx!==i) });

  const addSec    = () => up({ sections: [...d.sections, { id: genId(), label: '新しいセクション', items: [] }] });
  const updSec    = (si, label) => { const s=d.sections.map((x,i)=>i===si?{...x,label}:x); up({sections:s}); };
  const delSec    = (si) => up({ sections: d.sections.filter((_,i)=>i!==si) });
  const moveSecUp   = (si) => { if(si===0)return; const s=[...d.sections]; [s[si-1],s[si]]=[s[si],s[si-1]]; up({sections:s}); };
  const moveSecDown = (si) => { if(si===d.sections.length-1)return; const s=[...d.sections]; [s[si],s[si+1]]=[s[si+1],s[si]]; up({sections:s}); };

  const addItem   = (si) => { const s=JSON.parse(JSON.stringify(d.sections)); s[si].items.push({key:genId(),label:'新しい項目'}); up({sections:s}); };
  const updItem   = (si,ii,label) => { const s=JSON.parse(JSON.stringify(d.sections)); s[si].items[ii].label=label; up({sections:s}); };
  const delItem   = (si,ii) => { const s=JSON.parse(JSON.stringify(d.sections)); s[si].items=s[si].items.filter((_,i)=>i!==ii); up({sections:s}); };

  const addSbj    = () => { const s={...d.sbjSection,items:[...d.sbjSection.items,{key:genId(),label:'新しい項目'}]}; up({sbjSection:s}); };
  const updSbj    = (ii,label) => { const s=JSON.parse(JSON.stringify(d.sbjSection)); s.items[ii].label=label; up({sbjSection:s}); };
  const delSbj    = (ii) => { const s=JSON.parse(JSON.stringify(d.sbjSection)); s.items=s.items.filter((_,i)=>i!==ii); up({sbjSection:s}); };

  const iSt = {width:'100%',background:'#f0f4ff',border:'1px solid #c8d2f0',borderRadius:9,padding:'9px 12px',color:'#1e2a4a',fontSize:13,outline:'none'};
  const lSt = {fontSize:10,fontWeight:700,color:'#c8a94a',letterSpacing:'.07em',marginBottom:5,display:'block',textTransform:'uppercase'};
  const card = {background:'#fff',border:'1px solid #dde3f5',borderRadius:14,padding:14,marginBottom:12,boxShadow:'0 2px 8px rgba(200,169,74,.07)'};
  const row  = {display:'flex',alignItems:'center',gap:8,marginBottom:8};
  const delBtn = (fn) => (
    <button onClick={fn} style={{flexShrink:0,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:8,padding:'7px 10px',color:'#ef4444',fontSize:13,fontWeight:700}}>✕</button>
  );
  const addBtn = (fn, label, color='#c8a94a') => (
    <button onClick={fn} style={{width:'100%',padding:9,borderRadius:9,border:`1px dashed ${color}33`,background:`${color}08`,color:color,fontSize:12,fontWeight:700,marginTop:4}}>{label}</button>
  );

  return (
    <div style={{minHeight:'100vh',background:'#f0f4ff',paddingBottom:100}}>
      <div style={{background:'linear-gradient(135deg,#1e2a4a,#2d3e6e)',padding:'16px',position:'sticky',top:0,zIndex:100,display:'flex',alignItems:'center',gap:10,boxShadow:'0 2px 12px rgba(30,42,74,.25)'}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.35)',borderRadius:9,padding:'7px 12px',color:'#fff',fontSize:13,fontWeight:700}}>← 戻る</button>
        <div style={{flex:1,fontSize:16,fontWeight:900,color:'#fff'}}>⚙️ 設定</div>
        <button onClick={() => onSave(d)} style={{background:'#c8a94a',border:'none',borderRadius:9,padding:'8px 16px',color:'#fff',fontSize:13,fontWeight:900}}>保存</button>
      </div>

      <div style={{padding:16}}>
        <div style={{fontSize:12,fontWeight:700,color:'#c8a94a',marginBottom:10,letterSpacing:'.05em'}}>📱 基本設定</div>
        <div style={card}>
          <label style={lSt}>アプリタイトル</label>
          <input value={d.appTitle} onChange={e=>up({appTitle:e.target.value})} style={{...iSt,marginBottom:10}}/>
          <label style={lSt}>管理対象の呼び方</label>
          <input value={d.itemLabel} onChange={e=>up({itemLabel:e.target.value})} placeholder="物件・案件など" style={iSt}/>
        </div>

        <div style={{fontSize:12,fontWeight:700,color:'#c8a94a',marginBottom:10,marginTop:20,letterSpacing:'.05em'}}>🏷 ヘッダーフィールド設定</div>
        <div style={card}>
          {d.fields.map((f,i) => (
            <div key={f.key} style={row}>
              <input value={f.icon} onChange={e=>updField(i,{icon:e.target.value})}
                style={{...iSt,width:44,textAlign:'center',padding:'9px 4px',flexShrink:0}}/>
              <input value={f.label} onChange={e=>updField(i,{label:e.target.value})}
                style={{...iSt,flex:1}}/>
              <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#8a96b8',flexShrink:0,cursor:'pointer'}}>
                <input type="checkbox" checked={f.highlight||false} onChange={e=>updField(i,{highlight:e.target.checked})} style={{width:14,height:14}}/>強調
              </label>
              {delBtn(()=>delField(i))}
            </div>
          ))}
          {addBtn(addField, '＋ フィールドを追加')}
        </div>

        <div style={{fontSize:12,fontWeight:700,color:'#c8a94a',marginBottom:10,marginTop:20,letterSpacing:'.05em'}}>📂 タブ設定</div>
        <div style={card}>
          {d.tabs.map((t,i) => (
            <div key={t.key} style={row}>
              <input value={t.label} onChange={e=>updTab(i,e.target.value)} style={{...iSt,flex:1}}/>
              {delBtn(()=>delTab(i))}
            </div>
          ))}
          {addBtn(addTab, '＋ タブを追加')}
        </div>

        <div style={{fontSize:12,fontWeight:700,color:'#c8a94a',marginBottom:10,marginTop:20,letterSpacing:'.05em'}}>📋 チェックリスト セクション</div>
        {d.sections.map((sec,si) => (
          <div key={sec.id} style={card}>
            <div style={{...row,marginBottom:10}}>
              <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0}}>
                <button onClick={()=>moveSecUp(si)} disabled={si===0}
                  style={{padding:'3px 7px',borderRadius:6,border:'1px solid #dde3f5',background:si===0?'#f5f5f5':'#f0f4ff',color:si===0?'#ccc':'#4a5680',fontSize:12,fontWeight:700,cursor:si===0?'default':'pointer'}}>↑</button>
                <button onClick={()=>moveSecDown(si)} disabled={si===d.sections.length-1}
                  style={{padding:'3px 7px',borderRadius:6,border:'1px solid #dde3f5',background:si===d.sections.length-1?'#f5f5f5':'#f0f4ff',color:si===d.sections.length-1?'#ccc':'#4a5680',fontSize:12,fontWeight:700,cursor:si===d.sections.length-1?'default':'pointer'}}>↓</button>
              </div>
              <input value={sec.label} onChange={e=>updSec(si,e.target.value)} style={{...iSt,flex:1,fontWeight:700}}/>
              {delBtn(()=>delSec(si))}
            </div>
            {sec.items.map((item,ii) => (
              <div key={item.key} style={{...row,paddingLeft:10}}>
                <div style={{width:3,height:18,background:'#c8a94a',borderRadius:2,flexShrink:0,opacity:.35}}/>
                <input value={item.label} onChange={e=>updItem(si,ii,e.target.value)} style={{...iSt,flex:1,fontSize:12}}/>
                {delBtn(()=>delItem(si,ii))}
              </div>
            ))}
            {addBtn(()=>addItem(si), '＋ 項目を追加')}
          </div>
        ))}
        <button onClick={addSec} style={{width:'100%',padding:11,borderRadius:11,border:'1px dashed #c8a94a66',background:'#fef9ec',color:'#92400e',fontSize:13,fontWeight:700,marginBottom:20}}>
          ＋ セクションを追加
        </button>

        <div style={{fontSize:12,fontWeight:700,color:'#c8a94a',marginBottom:10,letterSpacing:'.05em'}}>⭐ 特別セクション</div>
        <div style={card}>

          <input value={d.sbjSection.label} onChange={e=>up({sbjSection:{...d.sbjSection,label:e.target.value}})} style={{...iSt,marginBottom:10,fontWeight:700}}/>
          {d.sbjSection.items.map((item,ii) => (
            <div key={item.key} style={{...row,paddingLeft:10}}>
              <div style={{width:3,height:18,background:'#6366f1',borderRadius:2,flexShrink:0,opacity:.5}}/>
              <input value={item.label} onChange={e=>updSbj(ii,e.target.value)} style={{...iSt,flex:1,fontSize:12}}/>
              {delBtn(()=>delSbj(ii))}
            </div>
          ))}
          {addBtn(addSbj, '＋ 項目を追加', '#6366f1')}
        </div>

        <button onClick={() => onSave(d)} style={{width:'100%',padding:15,borderRadius:14,border:'none',background:'linear-gradient(135deg,#c8a94a,#e4c96a)',color:'#fff',fontSize:15,fontWeight:900,marginTop:8}}>
          ✓ 設定を保存する
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// Card
// ══════════════════════════════════════
function Card({ prop, settings, onUpdate, onDeleteReq, onCopyReq, onMoveReq }) {
  const [open, setOpen] = useState(false);
  const { done, total, hasWarn } = calcProgress(prop.checks, settings, prop.sbjVisible);
  const bc = hasWarn ? '#f97316' : done===total ? '#10b981' : done===0 ? '#fca5a5' : '#c8d2f0';

  const upd = (f, v) => onUpdate(prop.id, { [f]: v });
  const updCheck = (id, key, next) => onUpdate(id, { checks: { ...prop.checks, [key]: next } });
  const updMemo  = (id, key, val)  => onUpdate(id, { warnMemos: { ...(prop.warnMemos||{}), [key]: val } });

  return (
    <div style={{background:'#fff',border:`1.5px solid ${bc}`,borderRadius:16,overflow:'hidden',marginBottom:10,boxShadow:'0 2px 12px rgba(200,169,74,.08)'}}>
      <div onClick={e => { if(e.target.closest('input')||e.target.closest('button')||e.target.closest('textarea'))return; setOpen(o=>!o); }}
        style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer',background:'#fff'}}>
        <Ring done={done} total={total}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,lineHeight:1.3,color:'#1e2a4a'}}>{prop.name||`（${settings.itemLabel}名未設定）`}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5,alignItems:'center'}}>
            {settings.sbjSection.enabled && (
              <span onClick={e=>{e.stopPropagation();onUpdate(prop.id,{sbjVisible:!prop.sbjVisible});}}
                style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',userSelect:'none',
                  background:prop.sbjVisible?'#4f6ef7':'#ffffff',
                  color:prop.sbjVisible?'#ffffff':'#a0aec0',
                  border:`1px solid ${prop.sbjVisible?'#4f6ef7':'#c8d2f0'}`,
                  boxShadow:prop.sbjVisible?'0 2px 8px rgba(79,110,247,0.35)':'none',
                  transition:'all .2s',gap:3}}>
                {prop.sbjVisible ? '✅ ON' : '⬜ OFF'}
              </span>
            )}
            {settings.fields.map(f => (
              <span key={f.key}
                style={{display:'inline-flex',alignItems:'center',gap:3,
                  background: f.highlight ? '#fef9ec' : '#f0f4ff',
                  border: `1px solid ${f.highlight ? '#c8a94a' : '#dde3f5'}`,
                  borderRadius:8,padding:'2px 6px 2px 7px',fontSize:11,
                  color: f.highlight ? '#92400e' : '#4a5680'}}>
                {f.icon}
                <input value={(prop.fields||{})[f.key]||''} onChange={e=>onUpdate(prop.id,{fields:{...(prop.fields||{}),[f.key]:e.target.value}})}
                  onClick={e=>e.stopPropagation()} placeholder={f.label}
                  style={{background:'transparent',border:'none',outline:'none',fontSize:11,fontWeight:600,
                    color: f.highlight ? '#92400e' : '#1e2a4a',
                    width: f.width || 80, padding:0}}/>
              </span>
            ))}
          </div>
        </div>
        <div style={{flexShrink:0,fontSize:11,color:'#8a96b8',transition:'transform .3s',transform:open?'rotate(180deg)':'none'}}>▼</div>
      </div>

      {open && (
        <div style={{padding:'0 14px 6px',background:'#f7f9ff',borderTop:'1px solid #e8eeff'}}>
          <div style={{padding:'12px 0 10px',borderBottom:'1px solid #e8eeff'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#c8a94a',marginBottom:5}}>🏠 {settings.itemLabel}名</div>
            <input value={prop.name||''} onChange={e=>upd('name',e.target.value)} placeholder={`${settings.itemLabel}名を入力`}
              style={{width:'100%',background:'#fff',border:'1px solid #c8d2f0',borderRadius:10,padding:'9px 12px',color:'#1e2a4a',fontSize:14,fontWeight:700,outline:'none'}}/>
          </div>

          {settings.sections.map((sec,si) => (
            <div key={sec.id} style={{background:'#fff',borderRadius:10,margin:'10px 0',padding:'2px 10px',border:'1px solid #e8eeff'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#c8a94a',letterSpacing:'.07em',padding:'9px 0 5px'}}>{sec.label}</div>
              {sec.items.map(item => (
                <CheckItem key={item.key} propId={prop.id} item={item}
                  value={prop.checks[item.key]??false}
                  warnMemo={(prop.warnMemos||{})[item.key]||''}
                  onToggle={updCheck} onWarnMemo={updMemo}/>
              ))}
            </div>
          ))}

          {settings.sbjSection.enabled && prop.sbjVisible && (
            <div style={{background:'#fef9ec',borderRadius:10,margin:'10px 0',padding:'2px 10px',border:'1px solid #c8a94a44'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#92400e',letterSpacing:'.07em',padding:'9px 0 5px'}}>{settings.sbjSection.label}</div>
              {settings.sbjSection.items.map(item => (
                <CheckItem key={item.key} propId={prop.id} item={item}
                  value={prop.checks[item.key]??false}
                  warnMemo={(prop.warnMemos||{})[item.key]||''}
                  onToggle={updCheck} onWarnMemo={updMemo}/>
              ))}
            </div>
          )}

          <div style={{display:'flex',justifyContent:'flex-end',gap:8,padding:'10px 0 12px'}}>
            <button onClick={e=>{e.stopPropagation();onMoveReq(prop.id);}}
              style={{padding:'7px 13px',borderRadius:9,border:'1px solid #dde3f5',background:'#f0f4ff',color:'#4a5680',fontSize:12,fontWeight:700}}>📂 移動</button>
            <button onClick={e=>{e.stopPropagation();onCopyReq(prop.id);}}
              style={{padding:'7px 13px',borderRadius:9,border:'1px solid #fcd34d',background:'#fef9ec',color:'#92400e',fontSize:12,fontWeight:700}}>📋 コピー</button>
            <button onClick={e=>{e.stopPropagation();onDeleteReq(prop.id);}}
              style={{padding:'7px 13px',borderRadius:9,border:'1px solid #fca5a5',background:'#fef2f2',color:'#ef4444',fontSize:12,fontWeight:700}}>🗑 削除</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// App
// ══════════════════════════════════════
function App() {
  const [settings, setSettings] = useState(loadSettings);
  const [props,    setProps]    = useState(loadProps);
  const [tab,      setTab]      = useState(() => loadSettings().tabs[0]?.key || '');
  const [filter,   setFilter]   = useState('all');
  const [screen,   setScreen]   = useState('main');
  const [saved,    setSaved]    = useState(false);
  const [showAdd,  setShowAdd]  = useState(false);
  const [deleteId, setDeleteId] = useState(null);
  const [copyId,   setCopyId]   = useState(null);
  const [moveId,   setMoveId]   = useState(null);

  useEffect(() => { saveProps(props); setSaved(true); const t=setTimeout(()=>setSaved(false),2000); return()=>clearTimeout(t); }, [props]);
  useEffect(() => { saveSettings(settings); }, [settings]);

  const handleSaveSettings = useCallback(draft => {
    setSettings(draft);
    if (!draft.tabs.find(t => t.key === tab)) setTab(draft.tabs[0]?.key || '');
    setScreen('main');
  }, [tab]);

  const upd    = useCallback((id, patch) => setProps(ps => ps.map(p => p.id===id ? {...p,...patch} : p)), []);
  const del    = useCallback(id => setProps(ps => ps.filter(p => p.id !== id)), []);

  const addProp = useCallback(({ name, fields, tab: t }) => {
    setProps(ps => [...ps, { id:genId(), name, fields, tab:t, sbjVisible:false, warnMemos:{}, checks:makeChecks(settings) }]);
    setTab(t); setShowAdd(false);
  }, [settings]);

  const doCopy = useCallback(toTab => {
    const src = props.find(p => p.id===copyId); if (!src) return;
    setProps(ps => [...ps, { ...JSON.parse(JSON.stringify(src)), id:genId(), name:src.name+'（コピー）', tab:toTab }]);
    setTab(toTab); setCopyId(null);
  }, [props, copyId]);

  const doMove = useCallback(toTab => {
    setProps(ps => ps.map(p => p.id===moveId ? {...p, tab:toTab} : p));
    setTab(toTab); setMoveId(null);
  }, [moveId]);

  const visible = useMemo(() => props.filter(p => {
    if (p.tab !== tab) return false;
    if (filter === 'all') return true;
    const { done, total, hasWarn } = calcProgress(p.checks, settings, p.sbjVisible);
    if (filter==='done')   return done===total;
    if (filter==='undone') return done!==total;
    if (filter==='warn')   return hasWarn;
    return true;
  }), [props, tab, filter, settings]);

  const stats = useMemo(() => {
    let done=0, warn=0, active=0;
    props.forEach(p => {
      const { done:d, total:t, hasWarn } = calcProgress(p.checks, settings, p.sbjVisible);
      if (hasWarn) warn++; else if (d===t) done++; else active++;
    });
    return { total: props.length, done, warn, active };
  }, [props, settings]);

  if (screen === 'settings') {
    return <SettingsScreen settings={settings} onSave={handleSaveSettings} onClose={() => setScreen('main')}/>;
  }

  return (
    <div style={{background:'#f0f4ff',minHeight:'100vh'}}>
      {/* ヘッダー */}
      <div style={{background:'linear-gradient(135deg,#1e2a4a,#2d3e6e)',padding:'16px 16px 12px',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 16px rgba(30,42,74,.35)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:'#c8a94a',letterSpacing:'.12em'}}>AXIA JAPAN</div>
            <div style={{fontSize:17,fontWeight:900,color:'#fff'}}>{settings.appTitle}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{background:'rgba(200,169,74,.3)',border:'1px solid rgba(200,169,74,.5)',color:'#e4c96a',fontSize:10,padding:'3px 8px',borderRadius:20,fontWeight:700,opacity:saved?1:0,transition:'opacity .4s'}}>✓ 保存済み</div>
            <button onClick={() => setScreen('settings')}
              style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.25)',borderRadius:9,padding:'6px 10px',color:'#fff',fontSize:13,fontWeight:700}}>⚙️</button>
          </div>
        </div>
        <div style={{display:'flex',gap:6,overflowX:'auto'}}>
          {settings.tabs.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              style={{flexShrink:0,padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:700,whiteSpace:'nowrap',
                border:`1px solid ${tab===t.key?'#c8a94a':'rgba(255,255,255,.2)'}`,
                background:tab===t.key?'#c8a94a':'rgba(255,255,255,.08)',
                color:tab===t.key?'#fff':'rgba(255,255,255,.8)'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* 統計バー */}
      <div style={{display:'flex',gap:8,padding:'10px 14px',background:'#fff',borderBottom:'1px solid #e8eeff',overflowX:'auto'}}>
        {[{n:stats.total,l:'全件',c:'#1e2a4a'},{n:stats.done,l:'完了',c:'#10b981'},{n:stats.warn,l:'要確認',c:'#f97316'},{n:stats.active,l:'対応中',c:'#ef4444'}].map(({n,l,c})=>(
          <div key={l} style={{flexShrink:0,display:'flex',alignItems:'center',gap:6,background:'#f7f9ff',border:`1.5px solid ${c}22`,borderRadius:10,padding:'6px 12px'}}>
            <div style={{fontSize:20,fontWeight:900,color:c,fontFamily:'DM Mono,monospace'}}>{n}</div>
            <div style={{fontSize:10,color:'#8a96b8',fontWeight:600}}>{l}</div>
          </div>
        ))}
      </div>

      {/* フィルター */}
      <div style={{display:'flex',gap:6,padding:'8px 12px',background:'#fff',borderBottom:'1px solid #e8eeff',overflowX:'auto'}}>
        {[['all','すべて'],['undone','🔴 未対応あり'],['done','🟢 完了'],['warn','⚠️ 要確認']].map(([k,l])=>(
          <button key={k} onClick={() => setFilter(k)}
            style={{flexShrink:0,padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,
              border:`1px solid ${filter===k?'#c8a94a':'#dde3f5'}`,
              background:filter===k?'#fef9ec':'transparent',
              color:filter===k?'#92400e':'#8a96b8'}}>
            {l}
          </button>
        ))}
      </div>

      {/* カードリスト */}
      <div style={{padding:'10px 12px 0'}}>
        {visible.length === 0
          ? <div style={{textAlign:'center',padding:'60px 20px',color:'#8a96b8',fontSize:14}}>
              <div style={{fontSize:40,marginBottom:12}}>🏠</div>
              該当する{settings.itemLabel}がありません
            </div>
          : visible.map(p => (
              <Card key={p.id} prop={p} settings={settings}
                onUpdate={upd} onDeleteReq={id=>setDeleteId(id)}
                onCopyReq={id=>setCopyId(id)} onMoveReq={id=>setMoveId(id)}/>
            ))
        }
      </div>

      {/* FAB */}
      <button onClick={() => setShowAdd(true)}
        style={{position:'fixed',bottom:24,right:20,width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,#c8a94a,#e4c96a)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,boxShadow:'0 4px 20px rgba(200,169,74,.5)',zIndex:200,border:'none',color:'#fff'}}>
        ＋
      </button>

      {showAdd   && <AddPropModal settings={settings} defaultTab={tab} onAdd={addProp} onClose={()=>setShowAdd(false)}/>}
      {moveId    && <MoveModal   prop={props.find(p=>p.id===moveId)||null}  settings={settings} onMove={doMove}  onClose={()=>setMoveId(null)}/>}
      {copyId    && <CopyModal   prop={props.find(p=>p.id===copyId)||null}  settings={settings} onCopy={doCopy}  onClose={()=>setCopyId(null)}/>}
      {deleteId  && <DeleteConfirm prop={props.find(p=>p.id===deleteId)||null} onConfirm={()=>{del(deleteId);setDeleteId(null);}} onClose={()=>setDeleteId(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
